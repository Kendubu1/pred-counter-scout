<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach report — Pred Scout</title>
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#12121a; --bg-2:#1a1a26; --bg-3:#22222f; --border:#2a2a3a;
    --text-0:#e8e8f0; --text-1:#a0a0b8; --text-2:#82829a;
    --accent:#6c5ce7; --accent-soft:rgba(108,92,231,.14);
    --green:#00c48c; --red:#ff5a5a; --gold:#f0b429; --blue:#4dabf7; --radius:12px; --maxw:980px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg-0); color:var(--text-0); font:15px/1.55 Inter,-apple-system,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  img { display:block; }
  button { font:inherit; cursor:pointer; -webkit-appearance:none; appearance:none; }
  .top { position:sticky; top:0; z-index:10; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); background:rgba(10,10,15,.78); border-bottom:1px solid var(--border); }
  .top-inner { max-width:var(--maxw); margin:0 auto; padding:.6rem 1rem .35rem; display:flex; align-items:center; gap:.45rem; }
  .wordmark { font-weight:800; color:var(--text-0); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .spacer { flex:1; }
  .navlink { padding:.2rem .7rem; border-radius:99px; color:var(--text-1); border:1px solid transparent; white-space:nowrap; }
  .navlink.active { background:var(--accent-soft); color:var(--text-0); border-color:var(--accent); }
  .navlink:hover { color:var(--text-0); }
  .subnav { display:flex; gap:.3rem; overflow-x:auto; max-width:var(--maxw); margin:0 auto; padding:.15rem 1rem .5rem; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .subnav::-webkit-scrollbar { display:none; }
  .subnav:empty { display:none; }
  .snpill { flex:none; font:inherit; font-size:.7rem; padding:.18rem .65rem; border-radius:99px; color:var(--text-2); background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap; text-transform:capitalize; -webkit-appearance:none; appearance:none; }
  .snpill.active { background:var(--bg-2); color:var(--text-0); border-color:var(--border); }
  .card { scroll-margin-top:calc(var(--toph, 96px) + 10px); }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:1.25rem 1rem 4rem; }
  .scope {
    font-size:.7rem; color:var(--text-2); border:1px solid var(--border);
    background:var(--bg-1); border-radius:8px; padding:.45rem .7rem; margin-bottom:1rem; line-height:1.5;
  }
  .scope b { color:var(--text-1); }
  h1 .ext { font-size:.7rem; vertical-align:middle; font-weight:400; }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; margin-top:1rem; }
  .card h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; color:var(--text-2); margin-bottom:.8rem; }
  h1 { font-size:1.7rem; font-weight:800; }
  h1 img.pav { width:34px; height:34px; border-radius:50%; object-fit:cover; border:1px solid var(--border); vertical-align:-7px; margin-right:.25rem; }
  .roster { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:.7rem; }
  .rost { display:flex; align-items:center; gap:.7rem; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:.85rem 1rem; color:var(--text-0); }
  .rost:hover { border-color:var(--accent); }
  .rost img.pav { width:38px; height:38px; border-radius:50%; object-fit:cover; border:1px solid var(--border); }
  .rost .rl { display:block; font-size:.7rem; color:var(--text-2); }
  /* coach reports collapsed into a narrow menu so the post-game review leads */
  .rostermenu { max-width:480px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-1); margin-bottom:1.2rem; }
  .rostermenu > summary { cursor:pointer; list-style:none; padding:.7rem .9rem; display:flex; align-items:center; gap:.5rem; }
  .rostermenu > summary::-webkit-details-marker { display:none; }
  .rostermenu > summary::before { content:"▸"; color:var(--accent); font-size:.8rem; }
  .rostermenu[open] > summary::before { content:"▾"; }
  .rostermenu .rm-t { font-weight:800; font-size:.96rem; }
  .rostermenu .rm-s { color:var(--text-2); font-size:.76rem; }
  .rostermenu .roster { display:flex; flex-direction:column; gap:.4rem; padding:0 .6rem .65rem; }
  .rostermenu .rost { padding:.5rem .7rem; gap:.6rem; background:var(--bg-2); }
  .rostermenu .rost img.pav { width:30px; height:30px; }
  .sub { color:var(--text-1); margin-top:.2rem; }
  .chip { white-space:nowrap; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.13rem .62rem; font-size:.76rem; color:var(--text-1); }
  .chip.rank { background:var(--accent-soft); border-color:var(--accent); color:var(--text-0); font-weight:700; }

  .goal { margin-top:.9rem; }
  .goalbar { position:relative; height:14px; border-radius:99px; background:var(--bg-2); border:1px solid var(--border); overflow:visible; }
  .goalbar .fill { height:100%; border-radius:99px; background:linear-gradient(90deg, var(--accent), var(--blue)); }
  .goalbar .peak { position:absolute; top:-5px; width:2px; height:24px; background:var(--gold); }
  .goalbar .peak::after { content:"peak"; position:absolute; top:-16px; left:-12px; font-size:.6rem; color:var(--gold); }
  .goal .lbl { display:flex; justify-content:space-between; font-size:.74rem; color:var(--text-2); margin-top:.45rem; }

  .verdict { font-size:1.05rem; border-left:3px solid var(--accent); padding:.5rem .9rem; background:var(--accent-soft); border-radius:0 8px 8px 0; margin-top:1rem; }
  .arch { margin-top:.35rem; font-size:1rem; color:var(--gold); font-weight:700; }
  .arch .arch-r { color:var(--text-2); font-weight:400; font-size:.78rem; }
  .ledg { display:grid; grid-template-columns:74px 1fr; gap:.8rem; align-items:center; padding:.5rem 0; border-bottom:1px solid var(--border); }
  .ledg:last-of-type { border-bottom:none; }
  .ledg .lv { font-size:1.3rem; font-weight:800; color:var(--green); font-variant-numeric:tabular-nums; }
  .ledg .lr { font-size:.74rem; color:var(--text-2); }
  .insight { padding:.6rem 0; border-bottom:1px solid var(--border); font-size:.88rem; color:var(--text-1); }
  .insight:last-of-type { border-bottom:none; }
  .insight b { color:var(--text-0); display:block; margin-bottom:.15rem; }
  .insight .ir { font-size:.72rem; color:var(--text-2); margin-top:.25rem; }

  .rolerow { display:grid; grid-template-columns:88px 1fr 140px; gap:.7rem; align-items:center; padding:.32rem 0; font-size:.85rem; }
  .rolerow .bar { height:9px; border-radius:99px; background:var(--bg-2); overflow:hidden; }
  .rolerow .bar i { display:block; height:100%; border-radius:99px; background:var(--accent); }
  .rolerow.best .bar i { background:var(--green); }
  .rolerow.worst .bar i { background:var(--red); }
  .rolerow .nums { text-align:right; color:var(--text-1); font-variant-numeric:tabular-nums; font-size:.78rem; }

  .lean { display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:.7rem; }
  .lcard { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:.8rem; }
  .lcard .head { display:flex; gap:.6rem; align-items:center; }
  .lcard img { width:44px; height:44px; border-radius:10px; object-fit:cover; }
  .lcard b { font-size:.95rem; }
  .lcard .edge { margin-left:auto; color:var(--green); font-weight:800; font-size:.9rem; }
  .lcard .stats { font-size:.74rem; color:var(--text-1); margin-top:.5rem; line-height:1.6; }
  .lcard .eng { font-size:.72rem; color:var(--text-2); margin-top:.4rem; border-top:1px dashed var(--border); padding-top:.4rem; }
  .lcard a.build { font-size:.76rem; }

  ol.plan { padding-left:1.2rem; }
  ol.plan li { margin:.55rem 0; color:var(--text-1); }
  ol.plan li::marker { color:var(--accent); font-weight:700; }
  .splits { width:100%; border-collapse:collapse; font-size:.8rem; }
  .splits td, .splits th { padding:.3rem .4rem; border-bottom:1px solid var(--border); text-align:left; }
  .splits th { color:var(--text-2); }
  .splits td.n { text-align:right; font-variant-numeric:tabular-nums; }
  footer { margin-top:2rem; font-size:.72rem; color:var(--text-2); line-height:1.7; }

  /* post-game review: record summary + filter pills + a scrollable game strip
     (lazy-loaded detail) so the list stays one row no matter how many games. */
  .pgfilter { display:flex; gap:.4rem; margin-bottom:.6rem; flex-wrap:wrap; }
  .pgf { font:inherit; font-size:.74rem; cursor:pointer; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.2rem .7rem; color:var(--text-2); -webkit-appearance:none; appearance:none; }
  .pgf.on { color:var(--text-0); border-color:var(--accent); background:var(--accent-soft); }
  .pgpick { display:flex; gap:.45rem; overflow-x:auto; padding-bottom:.5rem; scrollbar-width:thin; -webkit-overflow-scrolling:touch; }
  .pgpick::-webkit-scrollbar { height:6px; }
  .pgpick::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
  .pgchip { flex:none; font:inherit; font-size:.78rem; cursor:pointer; background:var(--bg-2); border:1px solid var(--border); border-radius:9px; padding:.35rem .6rem; color:var(--text-1); display:inline-flex; align-items:center; gap:.35rem; white-space:nowrap; -webkit-appearance:none; appearance:none; }
  .pgchip.on { border-color:var(--accent); background:var(--bg-3); }
  .pgchip .d { font-weight:600; }
  .pgchip .s { color:var(--text-2); font-size:.7rem; }
  .pgchip .c { color:var(--gold); font-size:.7rem; }

  /* ── mobile: smaller, crisp, nothing bleeds ── */
  @media (max-width:600px) {
    body { font-size:15px; }
    /* tap targets: >=44px hit area on touch (Apple HIG 44 / WCAG floor 24).
       Shared union list across all three pages (absent selectors are no-ops). */
    .navlink, .snpill, .htab, .rolebar button, .backrow button, .echip, .seg, .pick, button.pick, .ghostbtn, .ptoggle, .pgchip, .pgf, .fchip {
      min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    }
    .snpill { font-size:.8rem; }
    .navlink { border-radius:10px; } /* 44px tap height reads as a tab, not a stadium */
    .top-inner { padding:.5rem .7rem; gap:.3rem; }
    .wordmark { font-size:.82rem; white-space:nowrap; }
    .top-inner a { font-size:.72rem; white-space:nowrap; }
    .wrap { padding:.9rem .7rem 3rem; }
    h1 { font-size:1.35rem; }
    .arch { font-size:.86rem; }
    .arch .arch-r { display:block; margin-top:.1rem; }
    .sub .chip { font-size:.66rem; padding:.1rem .5rem; }
    .card { padding:.8rem .8rem; }
    .card h2 { font-size:.7rem; }
    .verdict { font-size:.86rem; padding:.4rem .7rem; }
    .ledg { grid-template-columns:58px 1fr; gap:.6rem; }
    .ledg .lv { font-size:1.05rem; }
    .insight { font-size:.8rem; }
    .rolerow { grid-template-columns:64px 1fr 110px; font-size:.72rem; }
    .lean { grid-template-columns:1fr; }
    .splits { font-size:.72rem; }
    .splits td, .splits th { padding:.25rem .3rem; }
    ol.plan li { font-size:.8rem; }
  }

  /* ── fight timeline ⇄ fight map: click a fight to LOCATE it (marching-ants
     dotted ring) and read WHAT it was (caption). Crisp heat, no blur. ── */
  .tlmark { cursor:pointer; transition:filter .12s; }
  .tlmark:hover { filter:brightness(1.3) saturate(1.2); }
  .tlmark.sel { box-shadow:0 0 0 2px var(--gold), 0 0 9px 1px rgba(240,180,41,.65) !important; }
  .fm-mark { fill:none; stroke:transparent; stroke-width:2.4; stroke-dasharray:5 4; transition:stroke .15s; }
  .fm-mark.on { stroke:var(--gold); animation:fmants .7s linear infinite; }
  .fm-halo { fill:none; stroke:var(--gold); stroke-width:1.4; opacity:0; transform-box:fill-box; transform-origin:center; }
  .fm-halo.on { animation:fmpulse 1.5s ease-out infinite; }
  @keyframes fmants  { to { stroke-dashoffset:-18; } }
  @keyframes fmpulse { 0% { opacity:.6; transform:scale(.55); } 100% { opacity:0; transform:scale(1.85); } }
  .fm-detail { margin-top:.6rem; font-size:.76rem; line-height:1.45; color:var(--text-1); background:var(--bg-2);
            border:1px solid var(--border); border-radius:8px; padding:.55rem .65rem; transition:border-color .2s; scroll-margin-top:92px; }
  .fm-detail.lit { border-color:var(--gold); }
  .fm-detail .mt { color:var(--gold); }
  /* compact "all fights" chip row — replaces the old full-detail re-expansion; a chip
     loads its fight into the single map panel (links timeline ↔ map ↔ breakdown). */
  .fchips { display:flex; gap:.35rem; overflow-x:auto; padding:.4rem 0 .2rem; scrollbar-width:thin; -webkit-overflow-scrolling:touch; }
  .fchips::-webkit-scrollbar { height:5px; } .fchips::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
  .fchip { flex:none; font:inherit; font-size:.72rem; cursor:pointer; background:var(--bg-2); border:1px solid var(--border);
           border-radius:8px; padding:.3rem .55rem; color:var(--text-1); white-space:nowrap; display:inline-flex; gap:.25rem; align-items:center; -webkit-appearance:none; appearance:none; }
  .fchip:hover { border-color:var(--text-2); }
  .fchip.sel { border-color:var(--gold); background:var(--bg-3); box-shadow:0 0 0 1px var(--gold); }
  /* kill ladder: the fight's death sequence, one row per kill — who fell, in
     what order, and the body count it left standing. The opener row is the story. */
  .kl { margin:.35rem 0 .1rem; border-left:2px solid var(--border); }
  .kl-row { display:flex; align-items:center; gap:.45rem; padding:.16rem 0 .16rem .55rem; font-size:.76rem; flex-wrap:wrap; }
  .kl-row.opener { background:linear-gradient(90deg, rgba(240,180,41,.10), transparent 70%); border-radius:0 6px 6px 0; }
  .kl-t { color:var(--text-2); font-size:.64rem; font-variant-numeric:tabular-nums; min-width:2.7rem; }
  .kl-role { font-size:.58rem; text-transform:uppercase; letter-spacing:.04em; color:var(--text-2);
             border:1px solid var(--border); border-radius:4px; padding:0 .3rem; }
  .kl-count { margin-left:auto; font-size:.66rem; font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }
  .kl-open-tag { font-size:.56rem; font-weight:800; letter-spacing:.06em; color:var(--gold); border:1px solid var(--gold);
                 border-radius:99px; padding:0 .35rem; }
  .fread { font-size:.8rem; color:var(--text-0); background:var(--bg-3); border-left:3px solid var(--accent);
           border-radius:0 8px 8px 0; padding:.45rem .65rem; margin:.4rem 0 .3rem; line-height:1.5; }
  .fdeath-sum { font-size:.74rem; color:var(--text-1); margin-top:.55rem; border-top:1px dashed var(--border); padding-top:.45rem; line-height:1.55; }
  .fseq { pointer-events:none; }
  .fight-flash { animation:fflash 1.5s ease-out; }
  @keyframes fflash { 0%,18% { box-shadow:0 0 0 2px var(--gold); } 100% { box-shadow:0 0 0 2px transparent; } }
  @media (prefers-reduced-motion:reduce) {
    html { scroll-behavior:auto; }
    .fm-mark.on, .fm-halo.on, .fight-flash { animation:none; }
    .fm-mark.on { stroke:var(--gold); } .fm-halo.on { opacity:.5; }
  }
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <a class="wordmark" href="./"><img src="../img/brand/logo.svg" alt="" width="22" height="22"> Pred Scout</a>
  <span class="spacer"></span>
  <a class="navlink" href="./">Pick &amp; Build</a>
  <a class="navlink" href="squad.html">Pre-Game</a>
  <a class="navlink active" href="coach.html">Coach</a>
</div><div class="subnav" id="subnav"></div></div>
<div class="wrap" id="page">loading…</div>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (x, d = 1) => (x * 100).toFixed(d);

// ── Post-game review rendering (omeda match facts + the coaching pass) ──
const himg = (slug) => `../img/heroes/${slug}.webp`;
const iimg = (slug) => `../img/items/${slug}.webp`;
// Prefer the mapped squad name: some omeda profiles are private and report a
// placeholder display_name like "🎮 user-<id>"; squadName is the real handle.
const pgName = (p) => esc(p.squadName || p.name);
const hlink = (slug, inner) => slug ? `<a href="index.html?hero=${esc(slug)}" title="open ${esc(slug)} in Pick &amp; Build">${inner}</a>` : inner;
function pgDots(v) {
  return `<span style="display:inline-flex;gap:3px;vertical-align:middle">` + [...v].map((c) =>
    `<span title="${c === 'y' ? 'your kill window' : c === 'e' ? 'their kill window' : 'even'}" style="width:11px;height:11px;border-radius:50%;display:inline-block;background:${c === 'y' ? 'var(--green)' : c === 'e' ? 'var(--red)' : 'var(--bg-3)'};${c === '=' ? 'border:1px solid var(--border)' : ''}"></span>`).join('') + `</span>`;
}
// Per-fight breakdown: the kill-by-kill, who fought (with kit archetypes), each of
// our fighters' builds + which spikes were online by then, and what the fight MEANT
// (the major objective that fell as a result). All from the match facts — honest:
// items shown are end-game (pred.gg gives no purchase timeline), the spike minute is
// the modeled "online" time, and the objective consequence is the real event stream.
function fightDetail(s, f) {
  const hName = (slug) => (f.players.find((p) => p.heroSlug === slug) || {}).heroName || slug;
  const kits = [...((f.kit && f.kit.ourKits) || []), ...((f.kit && f.kit.enemyKits) || [])];
  const kitOf = (name) => kits.find((k) => k.hero === name);
  const playerByHero = (slug) => f.players.find((p) => p.heroSlug === slug);
  const fmtT = (t) => `${Math.floor(t / 60)}:${String(t % 60).padStart(2, '0')}`;
  const ks = (f.kills || []).filter((k) => k.t >= s.startSec - 1 && k.t <= s.endSec + 1);

  // ── Kill ladder: the death sequence with the running body count. Alive
  // counts open from the macro read at the engage (fallback 5v5) and each
  // death decrements its side — so every row shows the fight state it left.
  const roleOf = (slug) => { const p = f.players.find((x) => x.heroSlug === slug); return p && p.role ? p.role : null; };
  let aliveUs = (s.macro && s.macro.ourAlive != null) ? s.macro.ourAlive : 5;
  let aliveThem = (s.macro && s.macro.theirAlive != null) ? s.macro.theirAlive : 5;
  const t0 = ks.length ? ks[0].t : s.startSec;
  const ladderRows = ks.map((k, i) => {
    const usDied = k.killedSide === 'us';
    if (usDied) aliveUs = Math.max(0, aliveUs - 1); else aliveThem = Math.max(0, aliveThem - 1);
    const role = roleOf(k.killedSlug);
    const dt = k.t - t0;
    const cntCol = aliveUs > aliveThem ? 'var(--green)' : aliveUs < aliveThem ? 'var(--red)' : 'var(--text-2)';
    return `<div class="kl-row${i === 0 ? ' opener' : ''}">
      <span class="kl-t">${i === 0 ? fmtT(k.t) : '+' + dt + 's'}</span>
      <span style="color:${k.killerSide === 'us' ? 'var(--green)' : 'var(--red)'};font-weight:700">${esc(hName(k.killerSlug))}</span>
      <span style="color:var(--text-2)">killed</span>
      <span style="font-weight:600;color:${usDied ? 'var(--red)' : 'var(--green)'}">${esc(hName(k.killedSlug))}</span>
      ${role ? `<span class="kl-role">${esc(role)}</span>` : ''}
      ${i === 0 ? '<span class="kl-open-tag">first death</span>' : ''}
      <span class="kl-count" style="color:${cntCol}" title="bodies standing after this kill (you v them)">${aliveUs}v${aliveThem}</span>
    </div>`;
  }).join('');
  const ladder = ks.length ? `<div class="kl">${ladderRows}</div>` : '';

  // ── Fight read: who opened on whom, and whether the first death decided it.
  // Pure arithmetic on the kill stream — no model, no guesses.
  let fread = '';
  if (ks.length) {
    const first = ks[0];
    const usOpened = first.killedSide === 'them';
    const vRole = roleOf(first.killedSlug);
    const after = ks.slice(1);
    const ourAfter = after.filter((k) => k.killedSide === 'them').length;
    const theirAfter = after.filter((k) => k.killedSide === 'us').length;
    const fightLen = ks.length > 1 ? (ks[ks.length - 1].t - t0) : 0;
    let line = `${usOpened ? 'You drew first blood' : 'They drew first blood'} — <b style="color:${usOpened ? 'var(--green)' : 'var(--red)'}">${esc(hName(first.killerSlug))}</b> killed <b>${esc(hName(first.killedSlug))}</b>${vRole ? ` (${esc(vRole)})` : ''}${fightLen ? `, and the fight ran ${fightLen}s more` : ', and it ended there'}. `;
    if (after.length) {
      if (usOpened && ourAfter >= theirAfter) line += `The pick held: you closed it ${s.ourKills}–${s.theirKills}.`;
      else if (usOpened && ourAfter < theirAfter) line += `But it flipped — they traded back ${theirAfter}–${ourAfter} after the opener. A pick is only a win if you cash it or leave.`;
      else if (!usOpened && theirAfter > ourAfter) line += `Down a body, the fight collapsed ${theirAfter}–${ourAfter} from there — after a first pick like that, the percentage play is to back off, not re-engage.`;
      else line += `You fought back from the deficit ${ourAfter}–${theirAfter} after the opener — losing the first pick didn't decide it.`;
    }
    if (vRole === 'carry' || vRole === 'support') {

    </div>

  // Fight timeline (TEAM): the fights that shaped the game, clustered from the

  // the place read are heuristics (THEORY).
  const tlDur = f.durationMin || 40;

  const tlMajors = (f.timeline ? f.timeline.majors : []).filter((m) => /FANG|PRIME|ORB/i.test(m.type));
  const objColor = (t) => /FANG/i.test(t) ? '#f0820f' : /ORB|PRIME/i.test(t) ? '#a855f7' : 'var(--text-2)';
  const hName = (slug) => (f.players.find((p) => p.heroSlug === slug) || {}).heroName || slug;
  const sks = (f.skirmishes || []).filter((s) => s.startMin <= tlDur + 1);
  const skCol = (r) => r === 'won' ? 'var(--green)' : r === 'lost' ? 'var(--red)' : 'var(--text-2)';
  // the fights worth leading with: tagged first, then by significance (mirrors keySkirmishes)
  const keySk = [...sks].filter((s) => s.tag || s.significance >= 6)
    .sort((a, b) => (b.tag ? 1 : 0) - (a.tag ? 1 : 0) || b.significance - a.significance).slice(0, 3);
  const decIdx = keySk.length ? sks.indexOf(keySk[0]) : (sks.length ? 0 : -1);   // the fight the panel/map lead with
  // First-death pattern across the game: who fell first in each fight, and how

  const openers = sks.map((s) => {
    const ks = (f.kills || []).filter((k) => k.t >= s.startSec - 1 && k.t <= s.endSec + 1);

  }).filter(Boolean);
  let fdSummary = '';
  if (openers.length >= 2) {
    const usFirst = openers.filter((o) => o.k.killedSide === 'us');
    const wonAfterLosingOpener = usFirst.filter((o) => o.s.result === 'won').length;

    usFirst.forEach((o) => { const p = f.players.find((x) => x.heroSlug === o.k.killedSlug); const key = (p ? p.heroName : o.k.killedSlug) + (p && p.role ? '|' + p.role : '|'); faller[key] = (faller[key] || 0) + 1; });
    const top = Object.entries(faller).sort((a, b) => b[1] - a[1])[0];

      ${sks.map((s, i) => { const x = xOf(s.startMin); const d = Math.min(22, 9 + s.size * 2); const ring = s.tag === 'game-defining' ? ';box-shadow:0 0 0 2px var(--gold)' : s.tag === 'bad-trade' ? ';box-shadow:0 0 0 2px rgba(255,90,90,.7)' : ''; return `<div id="tlmark-${i}" class="tlmark" onclick="focusFight(${i})" title="${s.startMin}m ${s.kind}: ${s.result} ${s.ourKills}-${s.theirKills} · ${esc(s.place)}${s.tag ? ' · ' + s.tag.replace('-', ' ') : ''} · tap to locate on the map" style="position:absolute;left:${x}%;top:${34 - d / 2}px;transform:translateX(-50%);width:${d}px;height:${d}px;border-radius:50%;background:${skCol(s.result)}${ring};display:flex;align-items:center;justify-content:center;font-size:.5rem;color:#fff;font-weight:800">${s.net > 0 ? '+' + s.net : s.net < 0 ? s.net : ''}</div>`; }).join('')}
    </div>
    <div style="font-size:.68rem;color:var(--text-2);line-height:1.5">● above = objective (Fangtooth/Orb·Prime, ring = who took it) · circle on the line = a fight, size = bodies, <span style="color:var(--green)">won</span>/<span style="color:var(--red)">lost</span>, number = net kills · <span style="color:var(--gold)">gold ring</span> = game-defining (heuristic, THEORY) · <b style="color:var(--blue)">tap a fight</b> to locate it on the map &amp; break it down</div>

    <div class="fchips">${sks.map((s, i) => { const op = openers.find((o) => o.s === s); const opTxt = op ? ` · first death: ${hName(op.k.killedSlug)} (${op.k.killedSide === 'us' ? 'you' : 'them'})` : ''; return `<button id="tlchip-${i}" class="fchip${i === decIdx ? ' sel' : ''}" onclick="focusFight(${i})" title="${s.startMin}m ${s.kind} ${s.result} ${s.ourKills}-${s.theirKills} · ${esc(s.place)}${esc(opTxt)}${s.tag ? ' · ' + s.tag.replace('-', ' ') : ''}"><b>${s.startMin}m</b> <span style="color:${skCol(s.result)};font-weight:700">${s.result === 'won' ? 'W' : s.result === 'lost' ? 'L' : '–'}${s.net > 0 ? '+' + s.net : s.net < 0 ? s.net : ''}</span>${s.tag === 'game-defining' ? ' <span style="color:var(--gold)">★</span>' : s.tag === 'bad-trade' ? ' <span style="color:var(--red)">⚠</span>' : ''}</button>`; }).join('')}</div>
    ${fdSummary}` : ''}`) : '';

  const comp = card(`
    <h2 style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-2);margin-bottom:.5rem">Team comp &amp; objectives</h2>
    <div style="font-size:.84rem;color:var(--text-1)">Damage — you: ${f.comp.ourDamage.physical}P/${f.comp.ourDamage.magical}M · them: ${f.comp.theirDamage.physical}P/${f.comp.theirDamage.magical}M · healers them: ${f.comp.theirHealers.join(', ') || 'none'}</div>
    <div style="font-size:.84rem;color:var(--text-1)">Objectives — you: ${f.objectives.ourKills}${f.timeline ? ' majors' : ' kills'} · them: ${f.objectives.theirKills}${f.timeline ? ` · towers ${f.timeline.towers.us}–${f.timeline.towers.them}` : ''} ${f.timeline && tlMajors.length ? '<span style="color:var(--text-2);font-size:.72rem">· when each fell: see the fight timeline above</span>' : ''}</div>

        <div style="font-weight:700;color:var(--red);font-size:.82rem;margin-bottom:.3rem">What the enemy kit threatens</div>
        ${(f.kit.threats || []).map((s) => `<div style="font-size:.84rem;color:var(--text-1);margin-bottom:.35rem">• ${esc(s)}</div>`).join('') || '<div style="color:var(--text-2);font-size:.82rem">no standout threats flagged</div>'}

    <div style="margin-top:.5rem;font-size:.72rem;color:var(--text-2)">Synergy/threat lines from structured ability data (CC, heals, AoE); per-hero combos/win-conditions/counters from the kit-knowledge pass. THEORY.</div>`) : '';

  const players = card(`

        ${p.spikes && p.spikes.length ? `<div style="font-size:.74rem;color:var(--text-2);margin-top:.2rem" title="When the median player on this kit affords each item (modeled spike, THEORY). Take fights once your power is online; respect them before.">⏱ Power online: ${p.spikes.slice(0, 4).map((s) => `${esc(s.name)} <b style="color:var(--text-1)">~${s.spikeMinute}m</b>`).join(' · ')}</div>` : ''}
        <div style="display:flex;gap:.25rem;flex-wrap:wrap;margin:.4rem 0">${built.map((i) => hlink(p.heroSlug, `<img src="${iimg(i.slug)}" title="${esc(i.name)} — open ${esc(p.heroSlug)} build" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border)" onerror="this.style.visibility='hidden'">`)).join('') || '<span style="color:var(--text-2);font-size:.78rem">no completed items</span>'}</div>
        ${p.antiHealRec ? `<div style="font-size:.78rem;color:var(--gold);margin-top:.2rem">🩹 Anti-heal: add <b>${esc(p.antiHealRec.item)}</b>${p.antiHealRec.swapOut ? ` (swap ${esc(p.antiHealRec.swapOut)})` : ''} — vs their healers</div>` : ''}
        ${wc && (p.missingCore || []).length ? `<div style="font-size:.74rem;color:${sharedCore <= 1 ? 'var(--gold)' : 'var(--text-2)'}">${sharedCore <= 1 ? '⚠ Off the winning build' : 'Build note'}: ran ${sharedCore}/${wc.items.length} of the ${wc.wr}%-winning core (${esc(wc.items.join(', '))}) — missing ${esc((p.missingCore || []).join(', '))}.</div>` : ''}
        ${p.matchupItemFlags.length ? `<div style="font-size:.74rem;color:var(--gold)">${p.matchupItemFlags.map(esc).join(' · ')}</div>` : ''}
        ${co?.perPlayer?.[p.pid] ? `<div style="font-size:.88rem;border-left:2px solid var(--accent);padding-left:.6rem;margin-top:.45rem">${esc(co.perPlayer[p.pid])}</div>` : ''}
      </div>`;
    }).join('')}
    ${f.draftNote ? `<div style="font-size:.78rem;color:var(--text-2);margin-top:.3rem;border-top:1px solid var(--border);padding-top:.5rem">⚑ Draft: ${esc(f.draftNote)} — minor; only flagged when it's a bottom-two lane.</div>` : ''}`);

  return head + lanes + timeline + fightMap(f) + comp + kit + players;
}

        const cache = {};
        const loadGame = (id) => (cache[id] ||= fetch(`../../data/postgame/${id}.json`).then((r) => r.json()));
        const stacks = [...new Set(pgList.map((m) => m.stackSize).filter(Boolean))].sort((a, b) => b - a);
        const fmtDate = (iso) => new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        let filter = 'all', cur = 0;
        const visible = () => filter === 'all' ? pgList : pgList.filter((m) => String(m.stackSize) === filter);
        // W-L summary reflects the active filter
        const updateSub = () => {
          const vis = visible();
          const w = vis.filter((m) => m.result === 'win').length;
          const label = filter === 'all' ? `${vis.length} ranked games on record` : `${vis.length} ${filter}-stack game${vis.length === 1 ? '' : 's'}`;
          sub.innerHTML = `${label} · <b style="color:var(--green)">${w}W</b> <b style="color:var(--red)">${vis.length - w}L</b> · newest first`;
        };
        const renderFilter = () => {
          filterEl.innerHTML = stacks.length > 1
            ? [['all', `All ${pgList.length}`], ...stacks.map((s) => [String(s), `${s}-stack`])]
                .map(([v, label]) => `<button class="pgf${filter === v ? ' on' : ''}" data-f="${v}">${label}</button>`).join('')
            : '';
        };
        const draw = async (i) => {
          cur = i;
          [...pick.children].forEach((b, j) => b.classList.toggle('on', j === i));
          const m = visible()[i];
          if (!m) { view.innerHTML = ''; return; }
          view.innerHTML = '<div style="color:var(--text-2);padding:1rem .2rem">loading…</div>';
          try { view.innerHTML = pgReview(await loadGame(m.matchId)); }
          catch { view.innerHTML = '<div style="color:var(--red);padding:1rem .2rem">could not load this match</div>'; }
        };
        const renderChips = () => {
          pick.innerHTML = visible().map((m, i) => {
            const c = m.result === 'win' ? 'var(--green)' : 'var(--red)';
            return `<button class="pgchip${i === cur ? ' on' : ''}" data-i="${i}">
              <b style="color:${c}">${m.result === 'win' ? 'W' : 'L'}</b>
              <span class="d">${fmtDate(m.startTime)}</span>
              <span class="s">${m.durationMin}m${m.stackSize ? ` · ${m.stackSize}-stack` : ''}</span>
              ${m.hasCoaching ? '<span class="c" title="coached">✎</span>' : ''}
            </button>`;
          }).join('');
          [...pick.children].forEach((b) => b.onclick = () => draw(Number(b.dataset.i)));
        };
        if (stacks.length > 1) {
          renderFilter();
          // delegate on the container so the handler survives renderFilter()
          // replacing the button elements (the old per-button binding went stale
          // after the first click, locking the filter).
          filterEl.onclick = (e) => {
            const b = e.target.closest('.pgf'); if (!b) return;
            filter = b.dataset.f; cur = 0;
            renderFilter(); renderChips(); draw(0); updateSub();
          };
        }
        updateSub();
        renderChips();
        draw(0);
      }
      return;
    }
    // no squad report on disk — fall through to the lead's standalone report
  }
  const src = who ? `../../data/artifacts/players/${who}.json` : '../../data/artifacts/coach.json';
  try { c = await (await fetch(src)).json(); }
  catch { document.getElementById('page').textContent = 'no coach report generated yet'; return; }
  document.title = `${c.player.name} — coach report`;
  const p = c.player;
  const fillPct = Math.min(100, (p.current.points / c.goal.vp) * 100);
  const peakPct = Math.min(100, (c.goal.peakAllTime / c.goal.vp) * 100);
  const maxRoleWr = Math.max(...c.roles.map((r) => r.shrunkWr));
  const best = c.roles.filter((r) => r.games >= 100)[0];
  const worst = [...c.roles].filter((r) => r.games >= 100).sort((a, b) => a.shrunkWr - b.shrunkWr)[0];

  let metaInfo = null;
  try { metaInfo = await (await fetch('../../data/artifacts/meta.json')).json(); } catch {}

  document.getElementById('page').innerHTML = `
    <div class="scope">📊 <b>Data scope:</b> this player's pred.gg public profile — career and hero stats count real 5v5s only (ranked + standard; ARAM and brawls excluded), ranked split history, last 40 matches · field baselines: ${metaInfo ? metaInfo.matches.toLocaleString() + ' matches, patch ' + esc(metaInfo.patch) : 'current-patch matches'}, all ranks · winrates adjusted toward the player's own average (thin samples count less) · combat math is THEORY pending in-game calibration · generated ${esc(c.generatedAt.slice(0, 16).replace('T', ' '))} UTC</div>
    <h1>${c.pool?.[0] ? `<img class="pav" src="../img/heroes/${esc(c.pool[0].slug)}.webp" alt="" onerror="this.remove()">` : ''}${esc(p.name)} <a class="ext" href="https://pred.gg/players/${esc(p.uuid)}" target="_blank" rel="noopener">pred.gg ↗</a></h1>
    ${c.archetype ? `<div class="arch">“${esc(c.archetype.label)}” <span class="arch-r">${esc(c.archetype.receipt)}</span></div>` : ''}
    <div class="sub">
      <span class="chip rank">${esc(p.current.rank)} · ${p.current.points} VP</span>
      <span class="chip">${p.career.games.toLocaleString()} career games</span>
      <span class="chip">${pct(p.career.winrate)}% winrate</span>
      <span class="chip">KDA ${p.career.kda.toFixed(2)}</span>
    </div>

    <div class="card">
      <h2>The road to Platinum</h2>
      <div class="goal">
        <div class="goalbar"><div class="fill" style="width:${fillPct}%"></div><div class="peak" style="left:${peakPct}%"></div></div>
        <div class="lbl"><span>${p.current.points} VP now</span><span>gap: ${c.goal.gapVp} VP</span><span>Platinum III at ${c.goal.vp} VP</span></div>
      </div>
      <div class="verdict">${esc((c.coachReasoning && c.coachReasoning.assessment) || c.plan[c.plan.length - 1])}</div>
      <table class="splits" style="margin-top:.9rem">
        <tr><th>split</th><th style="text-align:right">finish</th><th style="text-align:right">peak</th><th>rank</th></tr>
        ${p.ratings.map((r) => `<tr><td>${esc(r.split)}</td><td class="n">${r.points}</td><td class="n">${r.peak}</td><td>${esc(r.rank)}</td></tr>`).join('')}
      </table>
    </div>

    ${c.ledger && c.ledger.entries.length ? `
    <div class="card">
      <h2>The ledger · every change priced in wins per 100 games</h2>
      ${c.ledger.entries.map((e) => `
        <div class="ledg">
          <span class="lv">+${e.winsPer100}</span>
          <span><b>${esc(e.change)}</b><br><span class="lr">${esc(e.receipt)}</span></span>
        </div>`).join('')}
      <div style="font-size:.72rem;color:var(--text-2);margin-top:.5rem">${esc(c.ledger.note)}</div>
    </div>` : ''}

    ${(() => {
      const ins = (c.coachReasoning && c.coachReasoning.insights && c.coachReasoning.insights.length) ? c.coachReasoning.insights : c.insights;
      if (!ins || !ins.length) return '';
      return `
    <div class="card">
      <h2>The film room · what your games actually say</h2>
      ${ins.map((i) => `
        <div class="insight">
          <b>${esc(i.title)}</b>
          <div>${esc(i.finding)}</div>
          ${i.receipt ? `<div class="ir">🧾 ${esc(i.receipt)}</div>` : ''}
        </div>`).join('')}
    </div>`;
    })()}

    <div class="card">
      <h2>Role focus · winrate per role, thin samples adjusted</h2>
      ${c.roles.map((r) => `
        <div class="rolerow ${best && r.role === best.role ? 'best' : ''} ${worst && r.role === worst.role ? 'worst' : ''}">
          <span style="text-transform:capitalize">${esc(r.role)}</span>
          <span class="bar"><i style="width:${(r.shrunkWr / maxRoleWr) * 100}%"></i></span>
          <span class="nums">${pct(r.shrunkWr)}% · ${r.games} games</span>
        </div>`).join('')}
      <div style="font-size:.74rem; color:var(--text-2); margin-top:.5rem">green = queue this as primary · red = costing you VP</div>
    </div>

    <div class="card">
      <h2>Lean into these · heroes where you beat the average player</h2>
      <div class="lean">
        ${c.leanInto.map((h) => `
          <div class="lcard">
            <div class="head">
              <img src="../img/heroes/${esc(h.slug)}.webp" onerror="this.style.visibility='hidden'">
              <div><b>${esc(h.name)}</b><div style="font-size:.7rem;color:var(--text-2);text-transform:capitalize">${esc(h.primaryRole ?? '')}</div></div>
              <span class="edge" title="compared with the average player on this hero">+${pct(h.edge)} wins/100</span>
            </div>
            <div class="stats">
              you: <b>${pct(h.shrunkWr)}%</b> over ${h.games} games · field: ${pct(h.fieldWr)}%<br>
              KDA ${h.kda.toFixed(1)} · ${h.deathsPerGame.toFixed(1)} deaths/game${h.myRoles && h.myRoles.length ? `<br>where you play it: ${h.myRoles.map((r) => `${esc(r.role)} ${pct(r.rawWr, 0)}% · ${r.games} games`).join(' / ')}` : ''}
            </div>
            <div class="eng">${h.engineCoachLine ? `${esc(h.engineCoachLine)}<br>` : (h.engineEternal ? `engine: take <b>${esc(h.engineEternal)}</b> · ` : '')}<a class="build" href="./?hero=${esc(h.slug)}">eternal + build page →</a> <span style="color:var(--text-2)">(augment combos pending data)</span></div>
          </div>`).join('')}
      </div>
    </div>

    ${metaInfo ? (() => {
      const byGames = [...c.roles].sort((a, b) => b.games - a.games).filter((r) => r.games >= 50);
      const myRoles = [...new Set([best, ...byGames].filter(Boolean))].slice(0, 3);
      if (!myRoles.length) return '';
      const poolBySlug = new Map(c.pool.map((h) => [h.slug, h]));
      return `
    <div class="card">
      <h2>Meta picks in your lanes · what the field is winning with right now</h2>
      <div style="font-size:.78rem;color:var(--text-1);margin-bottom:.7rem">Comfort picks earn their spot, but the meta moves — these are the strongest current-patch heroes in the roles you actually queue. “New to you” means under 30 of your own games; the field winrate still makes them worth a look when your comfort pick gets countered or the team needs a different shape.</div>
      ${myRoles.map((r) => `
        <div style="margin-top:.6rem">
          <div style="font-size:.72rem;font-weight:800;text-transform:capitalize;color:var(--accent);letter-spacing:.06em">${esc(r.role)} · your record ${pct(r.shrunkWr)}% over ${r.games} games</div>
          ${(metaInfo.roles[r.role] || []).slice(0, 4).map((h) => {
            const mine = poolBySlug.get(h.slug);
            const note = mine && mine.games >= 30
              ? `you: ${pct(mine.shrunkWr)}% · ${mine.games} games`
              : '<span style="color:var(--gold)">new to you</span>';
            return `
          <div class="rolerow" style="grid-template-columns:auto 1fr auto">
            <span><img src="../img/heroes/${esc(h.slug)}.webp" style="width:22px;height:22px;border-radius:6px;object-fit:cover;vertical-align:-5px" onerror="this.style.visibility='hidden'"> <a href="./?hero=${esc(h.slug)}">${esc(h.name)}</a></span>
            <span style="font-size:.74rem;color:var(--text-2)">field ${pct(h.shrunkWr)}% over ${h.games.toLocaleString()} games</span>
            <span class="nums" style="font-size:.74rem">${note}</span>
          </div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;
    })() : ''}

    <div class="card">
      <h2>The plan</h2>
      <ol class="plan">${((c.coachReasoning && c.coachReasoning.plan && c.coachReasoning.plan.length) ? c.coachReasoning.plan : c.plan).map((s) => `<li>${esc(s)}</li>`).join('')}</ol>
    </div>

    <footer>
      <a href="about.html">About &amp; how this works</a> · Data: pred.gg public profile (${esc(c.generatedAt.slice(0, 10))}) joined with Pred Scout aggregate baselines.<br>
      ${c.honesty.map(esc).join(' · ')}
    </footer>`;
  buildSubnav();
})();

// Sticky section jumper: pills generated from the page's section headers,
// scrollspy keeps the current one highlighted as you scroll.
function buildSubnav() {
  const host = document.getElementById('subnav');
  const cards = [...document.querySelectorAll('.wrap .card')].filter((c) => c.querySelector('h2'));
  host.innerHTML = cards.map((c, i) => {
    c.id = c.id || 'sec' + i;
    const h = c.querySelector('h2');
    const label = (h.childNodes[0]?.textContent || h.textContent).split('·')[0].trim().toLowerCase();
    return `<button class="snpill" data-t="${c.id}">${esc(label)}</button>`;
  }).join('');
  document.documentElement.style.setProperty('--toph', `${document.querySelector('.top')?.offsetHeight ?? 96}px`);
  const pills = [...host.querySelectorAll('.snpill')];
  pills.forEach((p) => { p.onclick = () => document.getElementById(p.dataset.t)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
  // center the active pill by scrolling the pill ROW only — letting the
  // browser scroll ancestors pans the pinch-zoom viewport on iOS
  const centerPill = (p) => host.scrollTo({ left: p.offsetLeft - host.clientWidth / 2 + p.offsetWidth / 2, behavior: 'smooth' });
  const byId = new Map(pills.map((p) => [p.dataset.t, p]));
  const io = new IntersectionObserver((es) => {
    for (const e of es) {
      if (!e.isIntersecting) continue;
      pills.forEach((p) => p.classList.toggle('active', p.dataset.t === e.target.id));
      { const p = byId.get(e.target.id); if (p) centerPill(p); }
    }
  }, { rootMargin: '-15% 0px -75% 0px' });
  cards.forEach((c) => io.observe(c));
}
</script>
<script defer src="icons.js"></script>
<script defer src="nav.js"></script>
</body>
