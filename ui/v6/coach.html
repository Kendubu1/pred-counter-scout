<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach report — Predecessor Scout</title>
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#12121a; --bg-2:#1a1a26; --bg-3:#22222f; --border:#2a2a3a;
    --text-0:#e8e8f0; --text-1:#a0a0b8; --text-2:#82829a;
    --accent:#6c5ce7; --accent-soft:rgba(108,92,231,.14);
    --green:#00c48c; --red:#ff5a5a; --gold:#f0b429; --blue:#4dabf7; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  body { background:var(--bg-0); color:var(--text-0); font:15px/1.55 Inter,-apple-system,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  .top { position:sticky; top:0; z-index:10; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); background:rgba(10,10,15,.78); border-bottom:1px solid var(--border); }
  .top-inner { max-width:880px; margin:0 auto; padding:.6rem 1rem .35rem; display:flex; align-items:center; gap:.45rem; }
  .wordmark { font-weight:800; color:var(--text-0); }
  .spacer { flex:1; }
  .navlink { padding:.2rem .7rem; border-radius:99px; color:var(--text-1); border:1px solid transparent; white-space:nowrap; }
  .navlink.active { background:var(--accent-soft); color:var(--text-0); border-color:var(--accent); }
  .navlink:hover { color:var(--text-0); }
  .subnav { display:flex; gap:.3rem; overflow-x:auto; max-width:880px; margin:0 auto; padding:.15rem 1rem .5rem; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .subnav::-webkit-scrollbar { display:none; }
  .subnav:empty { display:none; }
  .snpill { flex:none; font:inherit; font-size:.7rem; padding:.18rem .65rem; border-radius:99px; color:var(--text-2); background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap; text-transform:capitalize; -webkit-appearance:none; appearance:none; }
  .snpill.active { background:var(--bg-2); color:var(--text-0); border-color:var(--border); }
  .card { scroll-margin-top:calc(var(--toph, 96px) + 10px); }
  .wrap { max-width:880px; margin:0 auto; padding:1.25rem 1rem 4rem; }
  .scope {
    font-size:.7rem; color:var(--text-2); border:1px solid var(--border);
    background:var(--bg-1); border-radius:8px; padding:.45rem .7rem; margin-bottom:1rem; line-height:1.5;
  }
  .scope b { color:var(--text-1); }
  h1 .ext { font-size:.7rem; vertical-align:middle; font-weight:400; }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; margin-top:1rem; }
  .card h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; color:var(--text-2); margin-bottom:.8rem; }
  h1 { font-size:1.7rem; font-weight:800; }
  h1 img.pav { width:34px; height:34px; border-radius:50%; object-fit:cover; border:1px solid var(--border); vertical-align:-7px; margin-right:.25rem; }
  .roster { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:.7rem; }
  .rost { display:flex; align-items:center; gap:.7rem; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:.85rem 1rem; color:var(--text-0); }
  .rost:hover { border-color:var(--accent); }
  .rost img.pav { width:38px; height:38px; border-radius:50%; object-fit:cover; border:1px solid var(--border); }
  .rost .rl { display:block; font-size:.7rem; color:var(--text-2); }
  .sub { color:var(--text-1); margin-top:.2rem; }
  .chip { white-space:nowrap; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.13rem .62rem; font-size:.76rem; color:var(--text-1); }
  .chip.rank { background:var(--accent-soft); border-color:var(--accent); color:var(--text-0); font-weight:700; }

  .goal { margin-top:.9rem; }
  .goalbar { position:relative; height:14px; border-radius:99px; background:var(--bg-2); border:1px solid var(--border); overflow:visible; }
  .goalbar .fill { height:100%; border-radius:99px; background:linear-gradient(90deg, var(--accent), var(--blue)); }
  .goalbar .peak { position:absolute; top:-5px; width:2px; height:24px; background:var(--gold); }
  .goalbar .peak::after { content:"peak"; position:absolute; top:-16px; left:-12px; font-size:.6rem; color:var(--gold); }
  .goal .lbl { display:flex; justify-content:space-between; font-size:.74rem; color:var(--text-2); margin-top:.45rem; }

  .verdict { font-size:1.05rem; border-left:3px solid var(--accent); padding:.5rem .9rem; background:var(--accent-soft); border-radius:0 8px 8px 0; margin-top:1rem; }
  .arch { margin-top:.35rem; font-size:1rem; color:var(--gold); font-weight:700; }
  .arch .arch-r { color:var(--text-2); font-weight:400; font-size:.78rem; }
  .ledg { display:grid; grid-template-columns:74px 1fr; gap:.8rem; align-items:center; padding:.5rem 0; border-bottom:1px solid var(--border); }
  .ledg:last-of-type { border-bottom:none; }
  .ledg .lv { font-size:1.3rem; font-weight:800; color:var(--green); font-variant-numeric:tabular-nums; }
  .ledg .lr { font-size:.74rem; color:var(--text-2); }
  .insight { padding:.6rem 0; border-bottom:1px solid var(--border); font-size:.88rem; color:var(--text-1); }
  .insight:last-of-type { border-bottom:none; }
  .insight b { color:var(--text-0); display:block; margin-bottom:.15rem; }
  .insight .ir { font-size:.72rem; color:var(--text-2); margin-top:.25rem; }

  .rolerow { display:grid; grid-template-columns:88px 1fr 140px; gap:.7rem; align-items:center; padding:.32rem 0; font-size:.85rem; }
  .rolerow .bar { height:9px; border-radius:99px; background:var(--bg-2); overflow:hidden; }
  .rolerow .bar i { display:block; height:100%; border-radius:99px; background:var(--accent); }
  .rolerow.best .bar i { background:var(--green); }
  .rolerow.worst .bar i { background:var(--red); }
  .rolerow .nums { text-align:right; color:var(--text-1); font-variant-numeric:tabular-nums; font-size:.78rem; }

  .lean { display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:.7rem; }
  .lcard { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:.8rem; }
  .lcard .head { display:flex; gap:.6rem; align-items:center; }
  .lcard img { width:44px; height:44px; border-radius:10px; object-fit:cover; }
  .lcard b { font-size:.95rem; }
  .lcard .edge { margin-left:auto; color:var(--green); font-weight:800; font-size:.9rem; }
  .lcard .stats { font-size:.74rem; color:var(--text-1); margin-top:.5rem; line-height:1.6; }
  .lcard .eng { font-size:.72rem; color:var(--text-2); margin-top:.4rem; border-top:1px dashed var(--border); padding-top:.4rem; }
  .lcard a.build { font-size:.76rem; }

  ol.plan { padding-left:1.2rem; }
  ol.plan li { margin:.55rem 0; color:var(--text-1); }
  ol.plan li::marker { color:var(--accent); font-weight:700; }
  .splits { width:100%; border-collapse:collapse; font-size:.8rem; }
  .splits td, .splits th { padding:.3rem .4rem; border-bottom:1px solid var(--border); text-align:left; }
  .splits th { color:var(--text-2); }
  .splits td.n { text-align:right; font-variant-numeric:tabular-nums; }
  footer { margin-top:2rem; font-size:.72rem; color:var(--text-2); line-height:1.7; }

  /* ── mobile: smaller, crisp, nothing bleeds ── */
  @media (max-width:600px) {
    body { font-size:13.5px; }
    .top-inner { padding:.5rem .7rem; gap:.55rem; }
    .wordmark { font-size:.82rem; white-space:nowrap; }
    .top-inner a { font-size:.72rem; white-space:nowrap; }
    .wrap { padding:.9rem .7rem 3rem; }
    h1 { font-size:1.35rem; }
    .arch { font-size:.86rem; }
    .arch .arch-r { display:block; margin-top:.1rem; }
    .sub .chip { font-size:.66rem; padding:.1rem .5rem; }
    .card { padding:.8rem .8rem; }
    .card h2 { font-size:.7rem; }
    .verdict { font-size:.86rem; padding:.4rem .7rem; }
    .ledg { grid-template-columns:58px 1fr; gap:.6rem; }
    .ledg .lv { font-size:1.05rem; }
    .insight { font-size:.8rem; }
    .rolerow { grid-template-columns:64px 1fr 110px; font-size:.72rem; }
    .lean { grid-template-columns:1fr; }
    .splits { font-size:.72rem; }
    .splits td, .splits th { padding:.25rem .3rem; }
    ol.plan li { font-size:.8rem; }
  }
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <a class="wordmark" href="./">⚔ Predecessor Scout</a>
  <span class="spacer"></span>
  <a class="navlink" href="./">Build Lab</a>
  <a class="navlink" href="squad.html">Squad</a>
  <a class="navlink active" href="coach.html">Coach</a>
</div><div class="subnav" id="subnav"></div></div>
<div class="wrap" id="page">loading…</div>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (x, d = 1) => (x * 100).toFixed(d);

// ── Post-game review rendering (omeda match facts + the coaching pass) ──
const himg = (slug) => `../img/heroes/${slug}.webp`;
const iimg = (slug) => `../img/items/${slug}.webp`;
// Prefer the mapped squad name: some omeda profiles are private and report a
// placeholder display_name like "🎮 user-<id>"; squadName is the real handle.
const pgName = (p) => esc(p.squadName || p.name);
function pgDots(v) {
  return `<span style="display:inline-flex;gap:3px;vertical-align:middle">` + [...v].map((c) =>
    `<span title="${c === 'y' ? 'your kill window' : c === 'e' ? 'their kill window' : 'even'}" style="width:11px;height:11px;border-radius:50%;display:inline-block;background:${c === 'y' ? 'var(--green)' : c === 'e' ? 'var(--red)' : 'var(--bg-3)'};${c === '=' ? 'border:1px solid var(--border)' : ''}"></span>`).join('') + `</span>`;
}
function pgReview(f) {
  const us = f.players.filter((p) => p.us);
  const ourOf = (role) => f.players.find((p) => p.us && p.role === role);
  const theirOf = (role) => f.players.find((p) => !p.us && p.role === role);
  const co = f.coaching;
  const resColor = f.result === 'win' ? 'var(--green)' : 'var(--red)';
  const resBg = f.result === 'win' ? 'rgba(0,196,140,.16)' : 'rgba(255,90,90,.16)';
  const edgeStyle = (e) => e === 'favored' ? 'color:var(--green)' : e === 'unfavored' ? 'color:var(--red)' : 'color:var(--text-1)';
  const card = (inner) => `<div style="background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-top:1rem">${inner}</div>`;

  const head = card(`
    <div style="display:flex;align-items:center;gap:.7rem;flex-wrap:wrap">
      <span style="font-weight:800;padding:.2rem .7rem;border-radius:8px;background:${resBg};color:${resColor}">${f.result.toUpperCase()}</span>
      <span style="color:var(--text-1);font-size:.85rem">${f.durationMin} min · ${esc(f.mode)} · ${new Date(f.startTime).toLocaleDateString()}${f.vpSwing != null ? ` · VP ${f.vpSwing >= 0 ? '+' : ''}${f.vpSwing}` : ''}${f.squad ? ` · stack ${f.squad.stackSize}` : ''}</span>
      <span style="margin-left:auto;font-size:.62rem;font-weight:700;color:var(--gold);border:1px solid var(--gold);border-radius:99px;padding:.1rem .5rem">THEORY</span>
    </div>
    ${co ? `<div style="font-size:1.05rem;font-weight:700;line-height:1.45;margin-top:.7rem">${esc(co.headline)}</div>
    <div style="color:var(--text-1);margin-top:.5rem;font-size:.92rem">${esc(co.team)}</div>
    <div style="border-left:3px solid var(--gold);padding:.5rem .8rem;background:rgba(240,180,41,.07);border-radius:6px;margin-top:.6rem;font-size:.9rem"><b>What would've shifted it:</b> ${esc(co.whatShiftedIt)}</div>` :
    `<div style="color:var(--text-2);margin-top:.5rem;font-size:.9rem">Facts computed; coaching narrative not yet authored for this match.</div>`}`);

  const lanes = card(`
    <h2 style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-2);margin-bottom:.7rem">Draft &amp; lane matchups <span style="font-weight:400;text-transform:none;letter-spacing:0">· kill-window per minute (5·10·15·20·25·30) · green = your window</span></h2>
    <table style="width:100%;border-collapse:collapse;font-size:.84rem">
      <tr style="color:var(--text-2);text-align:left"><th style="padding:.3rem">Lane</th><th>You</th><th>Enemy</th><th>Edge</th><th>Window</th></tr>
      ${f.lanes.map((l) => {
        const o = ourOf(l.role), t = theirOf(l.role);
        return `<tr style="border-top:1px solid var(--border)">
          <td style="padding:.4rem .3rem;text-transform:capitalize">${esc(l.role)}</td>
          <td style="padding:.4rem .3rem"><img src="${himg(l.ourSlug)}" style="width:24px;height:24px;border-radius:6px;vertical-align:middle" onerror="this.style.display='none'"> <b>${o ? pgName(o) : ''}</b> · ${esc(l.ourHero)}</td>
          <td style="padding:.4rem .3rem"><img src="${himg(l.theirSlug)}" style="width:24px;height:24px;border-radius:6px;vertical-align:middle" onerror="this.style.display='none'"> ${t ? esc(t.squadName || t.name) : ''} · ${esc(l.theirHero)}</td>
          <td style="padding:.4rem .3rem;font-weight:700;${edgeStyle(l.edge)}">${l.edge}</td>
          <td style="padding:.4rem .3rem">${pgDots(l.verdict)} <span style="color:var(--text-2);font-size:.75rem">${esc(l.summary)}</span></td>
        </tr>`;
      }).join('')}
    </table>`);

  const comp = card(`
    <h2 style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-2);margin-bottom:.5rem">Team comp &amp; objectives</h2>
    <div style="font-size:.84rem;color:var(--text-1)">Damage — you: ${f.comp.ourDamage.physical}P/${f.comp.ourDamage.magical}M · them: ${f.comp.theirDamage.physical}P/${f.comp.theirDamage.magical}M · healers them: ${f.comp.theirHealers.join(', ') || 'none'}</div>
    <div style="font-size:.84rem;color:var(--text-1)">Objectives — you: ${f.objectives.ourKills} kills / ${f.objectives.ourObjDamage.toLocaleString()} dmg · them: ${f.objectives.theirKills} / ${f.objectives.theirObjDamage.toLocaleString()}</div>
    ${f.comp.flags.length ? `<div style="font-size:.8rem;color:var(--gold);margin-top:.4rem">${f.comp.flags.map((x) => '• ' + esc(x)).join('<br>')}</div>` : ''}`);

  const players = card(`
    <h2 style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-2);margin-bottom:.6rem">Per-player review</h2>
    ${us.map((p) => {
      const built = p.items.filter((i) => !/Potion|Ward|Crest/i.test(i.name));
      return `<div style="border:1px solid var(--border);border-radius:10px;padding:.7rem .8rem;margin-bottom:.7rem;background:var(--bg-2)">
        <div style="display:flex;align-items:center;gap:.55rem;flex-wrap:wrap">
          <img src="${himg(p.heroSlug)}" style="width:30px;height:30px;border-radius:7px" onerror="this.style.visibility='hidden'">
          <b>${pgName(p)}</b>${p.isLead ? ' <span style="font-size:.62rem;color:var(--gold)">(lead)</span>' : ''}
          <span style="font-size:.68rem;text-transform:uppercase;color:var(--text-2);border:1px solid var(--border);border-radius:99px;padding:.05rem .4rem">${esc(p.role)}</span>
          <span style="font-size:.8rem;color:var(--text-1)">${esc(p.heroName)} · ${p.kills}/${p.deaths}/${p.assists} · perf ${p.performanceScore}${p.perfVsAvg != null ? ` (${p.perfVsAvg >= 0 ? '+' : ''}${p.perfVsAvg} vs avg)` : ''}</span>
          <span style="font-size:.68rem;background:var(--accent-soft);border-radius:99px;padding:.05rem .4rem">${esc(p.experienceVerdict)}</span>
          ${p.matchupItemFlags.map((fl) => `<span style="font-size:.68rem;background:rgba(255,90,90,.14);color:var(--red);border-radius:99px;padding:.05rem .4rem">⚠ ${esc(fl)}</span>`).join('')}
        </div>
        <div style="display:flex;gap:.25rem;flex-wrap:wrap;margin:.4rem 0">${built.map((i) => `<img src="${iimg(i.slug)}" title="${esc(i.name)}" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border)" onerror="this.style.visibility='hidden'">`).join('') || '<span style="color:var(--text-2);font-size:.78rem">no completed items</span>'}</div>
        ${p.missingCore.length ? `<div style="font-size:.74rem;color:var(--gold)">missing from optimal / field core: ${p.missingCore.map(esc).join(', ')}</div>` : ''}
        ${co?.perPlayer?.[p.pid] ? `<div style="font-size:.9rem;border-left:2px solid var(--accent);padding-left:.6rem;margin-top:.45rem">${esc(co.perPlayer[p.pid])}</div>` : ''}
      </div>`;
    }).join('')}`);

  return head + lanes + comp + players;
}

(async () => {
  let c;
  const who = new URLSearchParams(location.search).get('player');

  // No player chosen: show the team roster so everyone picks their own
  // report (deep links with ?player= keep working).
  if (!who) {
    let sq = null;
    try { sq = await (await fetch('../../data/artifacts/squad.json')).json(); } catch {}
    if (sq) {
      document.title = 'Coach reports — pick yours';
      // Post-game reviews of the squad's recent ranked games (committed, zero-API).
      let pgGames = [];
      try {
        const PG = await (await fetch('../../data/postgame/index.json')).json();
        pgGames = (await Promise.all((PG.matches || []).map(async (m) => {
          try { return await (await fetch(`../../data/postgame/${m.matchId}.json`)).json(); } catch { return null; }
        }))).filter(Boolean);
      } catch {}

      document.getElementById('page').innerHTML = `
        <h1>Coach reports</h1>
        <div class="sub" style="margin-bottom:1rem">one per member — pick yours</div>
        <div class="roster">
          ${sq.members.map((m) => `
            <a class="rost" href="coach.html?player=${esc(m.uuid)}">
              ${m.topHeroes?.[0] ? `<img class="pav" src="../img/heroes/${esc(m.topHeroes[0].slug)}.webp" alt="" onerror="this.remove()">` : ''}
              <span>
                <b>${esc(m.name)}</b>
                ${m.archetype ? `<span class="rl">“${esc(m.archetype.label)}”</span>` : ''}
                <span class="rl">${m.current ? `${esc(m.current.rank)} · ${m.current.points} VP · ` : ''}${m.career.games.toLocaleString()} games</span>
              </span>
              <span style="margin-left:auto;color:var(--text-2)">→</span>
            </a>`).join('')}
        </div>
        ${pgGames.length ? `
        <h1 style="margin-top:1.8rem">Post-game review</h1>
        <div class="sub" style="margin-bottom:.8rem">your 5-stack ranked games — pick a result to review</div>
        <div id="pgpick" style="display:flex;gap:.45rem;flex-wrap:wrap"></div>
        <div id="pgview"></div>` : ''}`;

      if (pgGames.length) {
        const pick = document.getElementById('pgpick');
        const view = document.getElementById('pgview');
        const draw = (i) => {
          [...pick.children].forEach((b, j) => b.style.borderColor = j === i ? 'var(--accent)' : 'var(--border)');
          view.innerHTML = pgReview(pgGames[i]);
        };
        pick.innerHTML = pgGames.map((g, i) => {
          const c = g.result === 'win' ? 'var(--green)' : 'var(--red)';
          return `<button data-i="${i}" style="font:inherit;font-size:.8rem;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:.3rem .65rem;color:var(--text-1)"><b style="color:${c}">${g.result.toUpperCase()}</b> · ${new Date(g.startTime).toLocaleDateString()} · ${g.durationMin}m</button>`;
        }).join('');
        [...pick.children].forEach((b) => b.onclick = () => draw(Number(b.dataset.i)));
        draw(0);
      }
      return;
    }
    // no squad report on disk — fall through to the lead's standalone report
  }
  const src = who ? `../../data/artifacts/players/${who}.json` : '../../data/artifacts/coach.json';
  try { c = await (await fetch(src)).json(); }
  catch { document.getElementById('page').textContent = 'no coach report generated yet'; return; }
  document.title = `${c.player.name} — coach report`;
  const p = c.player;
  const fillPct = Math.min(100, (p.current.points / c.goal.vp) * 100);
  const peakPct = Math.min(100, (c.goal.peakAllTime / c.goal.vp) * 100);
  const maxRoleWr = Math.max(...c.roles.map((r) => r.shrunkWr));
  const best = c.roles.filter((r) => r.games >= 100)[0];
  const worst = [...c.roles].filter((r) => r.games >= 100).sort((a, b) => a.shrunkWr - b.shrunkWr)[0];

  let metaInfo = null;
  try { metaInfo = await (await fetch('../../data/artifacts/meta.json')).json(); } catch {}

  document.getElementById('page').innerHTML = `
    <div class="scope">📊 <b>Data scope:</b> this player's pred.gg public profile — career and hero stats count real 5v5s only (ranked + standard; ARAM and brawls excluded), ranked split history, last 40 matches · field baselines: ${metaInfo ? metaInfo.matches.toLocaleString() + ' matches, patch ' + esc(metaInfo.patch) : 'current-patch matches'}, all ranks · winrates adjusted toward the player's own average (thin samples count less) · combat math is THEORY pending in-game calibration · generated ${esc(c.generatedAt.slice(0, 16).replace('T', ' '))} UTC</div>
    <h1>${c.pool?.[0] ? `<img class="pav" src="../img/heroes/${esc(c.pool[0].slug)}.webp" alt="" onerror="this.remove()">` : ''}${esc(p.name)} <a class="ext" href="https://pred.gg/players/${esc(p.uuid)}" target="_blank" rel="noopener">pred.gg ↗</a></h1>
    ${c.archetype ? `<div class="arch">“${esc(c.archetype.label)}” <span class="arch-r">${esc(c.archetype.receipt)}</span></div>` : ''}
    <div class="sub">
      <span class="chip rank">${esc(p.current.rank)} · ${p.current.points} VP</span>
      <span class="chip">${p.career.games.toLocaleString()} career games</span>
      <span class="chip">${pct(p.career.winrate)}% winrate</span>
      <span class="chip">KDA ${p.career.kda.toFixed(2)}</span>
    </div>

    <div class="card">
      <h2>The road to Platinum</h2>
      <div class="goal">
        <div class="goalbar"><div class="fill" style="width:${fillPct}%"></div><div class="peak" style="left:${peakPct}%"></div></div>
        <div class="lbl"><span>${p.current.points} VP now</span><span>gap: ${c.goal.gapVp} VP</span><span>Platinum III at ${c.goal.vp} VP</span></div>
      </div>
      <div class="verdict">${esc(c.plan[c.plan.length - 1])}</div>
      <table class="splits" style="margin-top:.9rem">
        <tr><th>split</th><th style="text-align:right">finish</th><th style="text-align:right">peak</th><th>rank</th></tr>
        ${p.ratings.map((r) => `<tr><td>${esc(r.split)}</td><td class="n">${r.points}</td><td class="n">${r.peak}</td><td>${esc(r.rank)}</td></tr>`).join('')}
      </table>
    </div>

    ${c.ledger && c.ledger.entries.length ? `
    <div class="card">
      <h2>The ledger · every change priced in wins per 100 games</h2>
      ${c.ledger.entries.map((e) => `
        <div class="ledg">
          <span class="lv">+${e.winsPer100}</span>
          <span><b>${esc(e.change)}</b><br><span class="lr">${esc(e.receipt)}</span></span>
        </div>`).join('')}
      <div style="font-size:.72rem;color:var(--text-2);margin-top:.5rem">${esc(c.ledger.note)}</div>
    </div>` : ''}

    ${c.insights && c.insights.length ? `
    <div class="card">
      <h2>The film room · what your games actually say</h2>
      ${c.insights.map((i) => `
        <div class="insight">
          <b>${esc(i.title)}</b>
          <div>${esc(i.finding)}</div>
          <div class="ir">🧾 ${esc(i.receipt)}</div>
        </div>`).join('')}
    </div>` : ''}

    <div class="card">
      <h2>Role focus · winrate per role, thin samples adjusted</h2>
      ${c.roles.map((r) => `
        <div class="rolerow ${best && r.role === best.role ? 'best' : ''} ${worst && r.role === worst.role ? 'worst' : ''}">
          <span style="text-transform:capitalize">${esc(r.role)}</span>
          <span class="bar"><i style="width:${(r.shrunkWr / maxRoleWr) * 100}%"></i></span>
          <span class="nums">${pct(r.shrunkWr)}% · ${r.games} games</span>
        </div>`).join('')}
      <div style="font-size:.74rem; color:var(--text-2); margin-top:.5rem">green = queue this as primary · red = costing you VP</div>
    </div>

    <div class="card">
      <h2>Lean into these · heroes where you beat the average player</h2>
      <div class="lean">
        ${c.leanInto.map((h) => `
          <div class="lcard">
            <div class="head">
              <img src="../img/heroes/${esc(h.slug)}.webp" onerror="this.style.visibility='hidden'">
              <div><b>${esc(h.name)}</b><div style="font-size:.7rem;color:var(--text-2);text-transform:capitalize">${esc(h.primaryRole ?? '')}</div></div>
              <span class="edge" title="compared with the average player on this hero">+${pct(h.edge)} wins/100</span>
            </div>
            <div class="stats">
              you: <b>${pct(h.shrunkWr)}%</b> over ${h.games} games · field: ${pct(h.fieldWr)}%<br>
              KDA ${h.kda.toFixed(1)} · ${h.deathsPerGame.toFixed(1)} deaths/game${h.myRoles && h.myRoles.length ? `<br>where you play it: ${h.myRoles.map((r) => `${esc(r.role)} ${pct(r.rawWr, 0)}% · ${r.games} games`).join(' / ')}` : ''}
            </div>
            <div class="eng">${h.engineCoachLine ? `${esc(h.engineCoachLine)}<br>` : (h.engineEternal ? `engine: take <b>${esc(h.engineEternal)}</b> · ` : '')}<a class="build" href="./?hero=${esc(h.slug)}">eternal + build page →</a> <span style="color:var(--text-2)">(augment combos pending data)</span></div>
          </div>`).join('')}
      </div>
    </div>

    ${metaInfo ? (() => {
      const byGames = [...c.roles].sort((a, b) => b.games - a.games).filter((r) => r.games >= 50);
      const myRoles = [...new Set([best, ...byGames].filter(Boolean))].slice(0, 3);
      if (!myRoles.length) return '';
      const poolBySlug = new Map(c.pool.map((h) => [h.slug, h]));
      return `
    <div class="card">
      <h2>Meta picks in your lanes · what the field is winning with right now</h2>
      <div style="font-size:.78rem;color:var(--text-1);margin-bottom:.7rem">Comfort picks earn their spot, but the meta moves — these are the strongest current-patch heroes in the roles you actually queue. “New to you” means under 30 of your own games; the field winrate still makes them worth a look when your comfort pick gets countered or the team needs a different shape.</div>
      ${myRoles.map((r) => `
        <div style="margin-top:.6rem">
          <div style="font-size:.72rem;font-weight:800;text-transform:capitalize;color:var(--accent);letter-spacing:.06em">${esc(r.role)} · your record ${pct(r.shrunkWr)}% over ${r.games} games</div>
          ${(metaInfo.roles[r.role] || []).slice(0, 4).map((h) => {
            const mine = poolBySlug.get(h.slug);
            const note = mine && mine.games >= 30
              ? `you: ${pct(mine.shrunkWr)}% · ${mine.games} games`
              : '<span style="color:var(--gold)">new to you</span>';
            return `
          <div class="rolerow" style="grid-template-columns:auto 1fr auto">
            <span><img src="../img/heroes/${esc(h.slug)}.webp" style="width:22px;height:22px;border-radius:6px;object-fit:cover;vertical-align:-5px" onerror="this.style.visibility='hidden'"> <a href="./?hero=${esc(h.slug)}">${esc(h.name)}</a></span>
            <span style="font-size:.74rem;color:var(--text-2)">field ${pct(h.shrunkWr)}% over ${h.games.toLocaleString()} games</span>
            <span class="nums" style="font-size:.74rem">${note}</span>
          </div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;
    })() : ''}

    <div class="card">
      <h2>The plan</h2>
      <ol class="plan">${c.plan.map((s) => `<li>${esc(s)}</li>`).join('')}</ol>
    </div>

    <footer>
      Data: pred.gg public profile (${esc(c.generatedAt.slice(0, 10))}) joined with Predecessor Scout aggregate baselines.<br>
      ${c.honesty.map(esc).join(' · ')}
    </footer>`;
  buildSubnav();
})();

// Sticky section jumper: pills generated from the page's section headers,
// scrollspy keeps the current one highlighted as you scroll.
function buildSubnav() {
  const host = document.getElementById('subnav');
  const cards = [...document.querySelectorAll('.wrap .card')].filter((c) => c.querySelector('h2'));
  host.innerHTML = cards.map((c, i) => {
    c.id = c.id || 'sec' + i;
    const h = c.querySelector('h2');
    const label = (h.childNodes[0]?.textContent || h.textContent).split('·')[0].trim().toLowerCase();
    return `<button class="snpill" data-t="${c.id}">${esc(label)}</button>`;
  }).join('');
  document.documentElement.style.setProperty('--toph', `${document.querySelector('.top')?.offsetHeight ?? 96}px`);
  const pills = [...host.querySelectorAll('.snpill')];
  pills.forEach((p) => { p.onclick = () => document.getElementById(p.dataset.t)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
  // center the active pill by scrolling the pill ROW only — letting the
  // browser scroll ancestors pans the pinch-zoom viewport on iOS
  const centerPill = (p) => host.scrollTo({ left: p.offsetLeft - host.clientWidth / 2 + p.offsetWidth / 2, behavior: 'smooth' });
  const byId = new Map(pills.map((p) => [p.dataset.t, p]));
  const io = new IntersectionObserver((es) => {
    for (const e of es) {
      if (!e.isIntersecting) continue;
      pills.forEach((p) => p.classList.toggle('active', p.dataset.t === e.target.id));
      { const p = byId.get(e.target.id); if (p) centerPill(p); }
    }
  }, { rootMargin: '-15% 0px -75% 0px' });
  cards.forEach((c) => io.observe(c));
}
</script>
