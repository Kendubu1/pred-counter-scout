<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squad report — Predecessor Scout</title>
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#12121a; --bg-2:#1a1a26; --bg-3:#22222f; --border:#2a2a3a;
    --text-0:#e8e8f0; --text-1:#a0a0b8; --text-2:#82829a;
    --accent:#6c5ce7; --accent-soft:rgba(108,92,231,.14);
    --green:#00c48c; --red:#ff5a5a; --gold:#f0b429; --blue:#4dabf7; --radius:12px; --maxw:980px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg-0); color:var(--text-0); font:15px/1.55 Inter,-apple-system,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  img { display:block; }
  button { font:inherit; cursor:pointer; -webkit-appearance:none; appearance:none; }
  .top { position:sticky; top:0; z-index:10; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); background:rgba(10,10,15,.78); border-bottom:1px solid var(--border); }
  .top-inner { max-width:var(--maxw); margin:0 auto; padding:.6rem 1rem .35rem; display:flex; align-items:center; gap:.45rem; }
  .wordmark { font-weight:800; color:var(--text-0); }
  .spacer { flex:1; }
  .navlink { padding:.2rem .7rem; border-radius:99px; color:var(--text-1); border:1px solid transparent; white-space:nowrap; }
  .navlink.active { background:var(--accent-soft); color:var(--text-0); border-color:var(--accent); }
  .navlink:hover { color:var(--text-0); }
  .subnav { display:flex; gap:.3rem; overflow-x:auto; max-width:var(--maxw); margin:0 auto; padding:.15rem 1rem .5rem; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .subnav::-webkit-scrollbar { display:none; }
  .subnav:empty { display:none; }
  .snpill { flex:none; font:inherit; font-size:.7rem; padding:.18rem .65rem; border-radius:99px; color:var(--text-2); background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap; text-transform:capitalize; -webkit-appearance:none; appearance:none; }
  .snpill.active { background:var(--bg-2); color:var(--text-0); border-color:var(--border); }
  .card { scroll-margin-top:calc(var(--toph, 96px) + 10px); }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:1.25rem 1rem 4rem; }
  .scope {
    font-size:.7rem; color:var(--text-2); border:1px solid var(--border);
    background:var(--bg-1); border-radius:8px; padding:.45rem .7rem; margin-bottom:1rem; line-height:1.5;
  }
  .scope b { color:var(--text-1); }
  a.plink { color:inherit; text-decoration:none; border-bottom:1px dotted var(--blue); }
  a.plink:hover { color:var(--blue); }
  img.pav { width:20px; height:20px; border-radius:50%; object-fit:cover; border:1px solid var(--border); vertical-align:-5px; margin-right:.1rem; align-self:center; }
  h1 { font-size:1.7rem; font-weight:800; }
  .sub { color:var(--text-1); margin-top:.3rem; display:flex; gap:.4rem; flex-wrap:wrap; }
  .chip { white-space:nowrap; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.13rem .62rem; font-size:.76rem; color:var(--text-1); }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; margin-top:1rem; }
  .card h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; color:var(--text-2); margin-bottom:.8rem; }
  .verdict { font-size:1rem; border-left:3px solid var(--accent); padding:.5rem .9rem; background:var(--accent-soft); border-radius:0 8px 8px 0; margin-top:.8rem; color:var(--text-1); }
  .verdict b { color:var(--text-0); }

  .seat { padding:.6rem 0; border-bottom:1px solid var(--border); }
  .seat:last-of-type { border-bottom:none; }
  .seathead { display:flex; align-items:baseline; gap:.55rem; flex-wrap:wrap; }
  .seathead .role { font-weight:800; text-transform:capitalize; color:var(--accent); min-width:64px; }
  .seathead .rwr { font-weight:800; font-variant-numeric:tabular-nums; }
  .seathead .sgames { margin-left:auto; color:var(--text-2); font-size:.72rem; font-variant-numeric:tabular-nums; }
  .seat .picks { margin-top:.4rem; }
  .snote { margin-top:.3rem; font-size:.7rem; color:var(--text-2); }
  .picks { display:flex; gap:.5rem; }
  .picks a { display:flex; align-items:center; gap:.35rem; font-size:.76rem; color:var(--text-1); background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:.2rem .5rem; }
  .picks a:hover { border-color:var(--accent); color:var(--text-0); }
  .picks img { width:22px; height:22px; border-radius:6px; object-fit:cover; }

  .members { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:.7rem; }
  .member { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:.8rem; }
  .member .nm { font-weight:800; }
  .member .meta { font-size:.72rem; color:var(--text-2); margin-top:.1rem; }
  .rolemini { display:grid; grid-template-columns:74px 1fr 96px; gap:.5rem; align-items:center; font-size:.74rem; margin-top:.3rem; }
  .rolemini .bar { height:7px; border-radius:99px; background:var(--bg-3); overflow:hidden; }
  .rolemini .bar i { display:block; height:100%; background:var(--accent); border-radius:99px; }
  .rolemini .n { text-align:right; color:var(--text-2); font-variant-numeric:tabular-nums; }
  .who { display:flex; gap:.45rem; flex-wrap:wrap; }
  .plansplit { display:grid; grid-template-columns:1fr auto; gap:1rem; align-items:start; padding-bottom:.7rem; border-bottom:1px dashed var(--border); }
  .grouplabel { font-size:.62rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--text-2); margin-bottom:.35rem; }
  .planstep { margin-bottom:.9rem; }
  .steplabel { display:flex; align-items:center; gap:.45rem; font-size:.84rem; font-weight:700; color:var(--text-0); margin-bottom:.5rem; }
  .stepn { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:var(--accent); color:#fff; font-size:.66rem; font-weight:800; flex:none; }
  .stephint { font-size:.68rem; color:var(--text-2); margin-top:.4rem; }
  .ptoggles { display:flex; gap:.5rem; flex-wrap:wrap; }
  .ptoggle { display:flex; align-items:center; gap:.4rem; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.28rem .7rem .28rem .35rem; font:inherit; font-size:.82rem; color:var(--text-2); cursor:pointer; transition:border-color .12s, color .12s, background .12s; }
  .ptoggle img { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1px solid var(--border); filter:grayscale(1) opacity(.5); transition:filter .12s; margin:0; }
  .ptoggle[aria-pressed="true"] { background:var(--accent-soft); border-color:var(--accent); color:var(--text-0); font-weight:600; }
  .ptoggle[aria-pressed="true"] img { filter:none; border-color:var(--accent); }
  .ptoggle::before { content:""; width:14px; height:14px; border-radius:50%; border:1.5px solid var(--text-2); flex:none; display:inline-flex; align-items:center; justify-content:center; font-size:.6rem; }
  .ptoggle[aria-pressed="true"]::before { content:"✓"; background:var(--accent); border-color:var(--accent); color:#fff; }
  .segmented { display:inline-flex; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.15rem; gap:.1rem; }
  .seg { font:inherit; font-size:.8rem; border:none; background:transparent; color:var(--text-2); border-radius:99px; padding:.28rem .8rem; cursor:pointer; white-space:nowrap; }
  .seg[aria-pressed="true"] { background:var(--accent); color:#fff; font-weight:600; }
  .ghostbtn { margin-left:auto; font:inherit; font-size:.76rem; background:var(--bg-2); border:1px solid var(--border); color:var(--text-1); border-radius:99px; padding:.2rem .65rem; cursor:pointer; }
  .ghostbtn:hover { border-color:var(--accent); color:var(--text-0); }
  .pick { display:flex; align-items:center; gap:.35rem; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.24rem .6rem; font-size:.78rem; cursor:pointer; user-select:none; }
  button.pick { -webkit-appearance:none; appearance:none; font:inherit; font-size:.82rem; color:var(--text-0); }
  .pick input { accent-color:var(--accent); }
  .planseat { display:grid; grid-template-columns:84px 1fr auto; gap:.7rem; align-items:center; padding:.4rem 0; border-bottom:1px solid var(--border); font-size:.86rem; }
  .planseat:last-of-type { border-bottom:none; }
  .planseat .r { font-weight:800; text-transform:capitalize; color:var(--accent); }
  .planseat .picks-mini { font-size:.74rem; color:var(--text-2); }
  .picks-mini .hico { width:20px; height:20px; border-radius:5px; object-fit:cover; vertical-align:-5px; margin-right:.25rem; }
  .pairrow { display:grid; grid-template-columns:minmax(170px, 310px) 1fr 96px; gap:.7rem; align-items:center; padding:.3rem 0; font-size:.82rem; }
  .pairrow .names { color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pairrow .bar { height:8px; border-radius:99px; background:var(--bg-2); overflow:hidden; }
  .pairrow .bar i { display:block; height:100%; border-radius:99px; }
  .pairrow .n { text-align:right; color:var(--text-2); font-variant-numeric:tabular-nums; font-size:.76rem; }
  ul.notes { padding-left:1.1rem; }
  ul.notes li { margin:.45rem 0; color:var(--text-1); }
  footer { margin-top:2rem; font-size:.72rem; color:var(--text-2); line-height:1.7; }

  /* ── mobile: smaller, stacked, nothing bleeds ── */
  @media (max-width:600px) {
    body { font-size:15px; }
    /* tap targets: >=44px hit area on touch (Apple HIG 44 / WCAG floor 24).
       Shared union list across all three pages (absent selectors are no-ops). */
    .navlink, .snpill, .htab, .rolebar button, .backrow button, .echip, .seg, .pick, button.pick, .ghostbtn, .ptoggle {
      min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    }
    .snpill { font-size:.8rem; }
    .navlink { border-radius:10px; } /* 44px tap height reads as a tab, not a stadium */
    .top-inner { padding:.5rem .7rem; gap:.55rem; }
    .wordmark { font-size:.82rem; white-space:nowrap; }
    .top-inner a { font-size:.72rem; white-space:nowrap; }
    .wrap { padding:.9rem .7rem 3rem; }
    h1 { font-size:1.35rem; }
    .sub .chip { font-size:.66rem; padding:.1rem .5rem; }
    .card { padding:.8rem .8rem; }
    .card h2 { font-size:.7rem; }
    .verdict { font-size:.84rem; padding:.4rem .7rem; }

    .seathead { gap:.45rem; }
    .seathead .role { min-width:0; font-size:.82rem; }
    .seathead .sgames { flex-basis:100%; margin-left:0; }
    .picks { flex-wrap:wrap; gap:.35rem; }
    .picks a { font-size:.7rem; padding:.16rem .4rem; }
    .picks img { width:18px; height:18px; }

    /* planner */
    .plansplit { grid-template-columns:1fr; gap:.55rem; }
    .pick { font-size:.7rem; padding:.18rem .5rem; }
    .planseat { grid-template-columns:64px 1fr; gap:.1rem .5rem; padding:.45rem 0; font-size:.8rem; }
    .planseat .picks-mini { grid-column:1 / -1; font-size:.68rem; }

    /* duo synergy rows */
    .pairrow { grid-template-columns:1fr 84px; gap:.2rem .5rem; }
    .pairrow .names { grid-column:1 / -1; font-size:.76rem; white-space:normal; overflow:visible; line-height:1.8; }
    .pairrow .n { font-size:.68rem; }

    /* member cards */
    .members { grid-template-columns:1fr; gap:.55rem; }
    .member { padding:.65rem; }
    .member .nm { font-size:.92rem; }
    .rolemini { grid-template-columns:62px 1fr 86px; font-size:.68rem; }
    ul.notes li { font-size:.8rem; }
  }
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <a class="wordmark" href="./">⚔ Predecessor Scout</a>
  <span class="spacer"></span>
  <a class="navlink" href="./">Build Lab</a>
  <a class="navlink active" href="squad.html">Squad</a>
  <a class="navlink" href="coach.html">Coach</a>
</div><div class="subnav" id="subnav"></div></div>
<div class="wrap" id="page">loading…</div>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (x, d = 1) => (x * 100).toFixed(d);
const plink = (uuid, name) => uuid
  ? `<a class="plink" href="coach.html?player=${esc(uuid)}">${esc(name)}</a>`
  : esc(name);
(async () => {
  let s, coach = null, META = null;
  try { s = await (await fetch('../../data/artifacts/squad.json')).json(); }
  catch { document.getElementById('page').textContent = 'no squad report generated yet'; return; }
  try { coach = await (await fetch('../../data/artifacts/coach.json')).json(); } catch {}
  try { META = await (await fetch('../../data/artifacts/meta.json')).json(); } catch {}
  // full hero pools per member, for honest meta-pick annotations (static files, no API)
  const POOLS = new Map();
  await Promise.all(s.members.map(async (m) => {
    try {
      const p = await (await fetch(`../../data/artifacts/players/${m.uuid}.json`)).json();
      POOLS.set(m.uuid, new Map(p.pool.map((h) => [h.slug, h])));
    } catch { POOLS.set(m.uuid, new Map()); }
  }));
  // signature-hero portrait shown next to each player's name (most-played hero)
  const AVATAR = new Map(s.members.map((m) => [m.uuid, m.topHeroes?.[0]?.slug ?? null]));
  const pav = (uuid) => {
    const slug = AVATAR.get(uuid);
    return slug ? `<img class="pav" src="../img/heroes/${esc(slug)}.webp" alt="" onerror="this.remove()">` : '';
  };

  const lead = s.members[0];
  document.getElementById('page').innerHTML = `
    <div class="scope">📊 <b>Data scope:</b> pred.gg public profiles — career and hero stats count real 5v5s only (ranked + standard; ARAM and brawls excluded), ranked splits, last 40 matches each · field baselines: ${META ? META.matches.toLocaleString() + ' matches, patch ' + esc(META.patch) : 'current-patch matches'}, all ranks · combat math is THEORY pending in-game calibration · generated ${esc(s.generatedAt.slice(0, 16).replace('T', ' '))} UTC</div>
    <h1>The five stack</h1>

    <div class="card">
      <h2>The lineup</h2>
      <div class="planstep">
        <div class="steplabel"><span class="stepn">1</span> Who's online tonight?</div>
        <div class="ptoggles" id="who">
          ${s.members.map((m) => {
            const short = m.name.split(' ')[0];
            return `<button class="ptoggle" type="button" data-uuid="${m.uuid}" aria-pressed="true">${pav(m.uuid)}<span>${esc(short.length > 10 ? short.slice(0, 9) + '…' : short)}</span></button>`;
          }).join('')}
        </div>
      </div>
      <div class="planstep">
        <div class="steplabel"><span class="stepn">2</span> Hero pool <button id="shuffle" class="ghostbtn" type="button">🎲 shuffle</button></div>
        <div class="segmented" id="mode" role="radiogroup" aria-label="Hero pool">
          <button class="seg" type="button" data-v="wheel" aria-pressed="true">🏠 Wheelhouse</button>
          <button class="seg" type="button" data-v="meta" aria-pressed="false">🔥 Meta</button>
          <button class="seg" type="button" data-v="any" aria-pressed="false">🌊 Any lane</button>
        </div>
        <div class="stephint">Wheelhouse = heroes each player has real games on · Meta = the current patch's best · Any = the whole lane's roster</div>
      </div>
      <div id="planOut"></div>
    </div>

    <div class="card">
      <h2>Queued together · record as ranked teammates</h2>
      ${s.trios && s.trios.length ? `
      <div class="who" id="synmode" style="margin-bottom:.6rem">
        <label class="pick"><input type="radio" name="syn" value="duo" checked> duos</label>
        <label class="pick"><input type="radio" name="syn" value="trio"> trios</label>
      </div>` : ''}
      <div id="synOut"></div>
      <div id="synNote" style="font-size:.72rem;color:var(--text-2);margin-top:.5rem"></div>
    </div>

    <div class="card">
      <h2>The members</h2>
      <div class="members">
        ${s.members.map((m) => `
          <div class="member">
            <div class="nm">${pav(m.uuid)}<a href="coach.html?player=${esc(m.uuid)}">${esc(m.name)} →</a></div>
            ${m.archetype ? `<div style="color:var(--gold);font-size:.72rem;font-weight:700" title="${esc(m.archetype.receipt)}">“${esc(m.archetype.label)}”</div>` : ''}
            ${m.topInsight ? `<div style="font-size:.72rem;color:var(--text-1);margin-top:.25rem" title="${esc(m.topInsight.receipt)}">🎬 ${esc(m.topInsight.title)}</div>` : ''}
            <div class="meta">${m.career.games.toLocaleString()} games · ${pct(m.career.winrate)}% career · KDA ${m.career.kda.toFixed(2)}${m.peakAllTime ? ` · peak ${m.peakAllTime} VP` : ''}</div>
            ${m.roles.slice(0, 3).map((r) => `
              <div class="rolemini"><span style="text-transform:capitalize">${esc(r.role)}</span>
                <span class="bar"><i style="width:${Math.min(100, (r.shrunkWr / 0.6) * 100)}%"></i></span>
                <span class="n">${pct(r.shrunkWr)}% · ${r.games} games</span></div>`).join('')}
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Coach notes</h2>
      <ul class="notes">${s.notes.map((n) => `<li>${esc(n)}</li>`).join('')}</ul>
    </div>

    <footer>
      <a href="about.html">About &amp; how this works</a> · Data: pred.gg public profiles, ranked common-teammate records (${esc(s.generatedAt.slice(0, 10))}).<br>
      ${s.honesty.map(esc).join(' · ')}
    </footer>`;

  // ── partial-stack planner: best roles for whoever is queueing tonight ──
  const ROLES = ['carry', 'midlane', 'offlane', 'jungle', 'support'];
  const perms = (arr, k) => k === 0 ? [[]] :
    arr.flatMap((x, i) => perms([...arr.slice(0, i), ...arr.slice(i + 1)], k - 1).map((rest) => [x, ...rest]));

  const duoKey = (a, b) => [a, b].sort().join('|');
  function duoBonus(carryUuid, supportUuid) {
    const rec = (s.duoLane || {})[duoKey(carryUuid, supportUuid)];
    return rec ? (rec.shrunkWr - 0.5) * 0.6 : 0; // matches the engine optimizer
  }
  function solveTop(selected, k = 3) {
    const ms = s.roleScores.filter((r) => selected.includes(r.uuid));
    if (ms.length < 2) return null;
    const all = perms(ROLES, ms.length).map((order) => {
      let total = order.reduce((sum, role, i) => sum + ms[i].scores[role].score, 0);
      const ci = order.indexOf('carry'), si = order.indexOf('support');
      if (ci !== -1 && si !== -1) total += duoBonus(ms[ci].uuid, ms[si].uuid);
      return { order, total };
    }).sort((a, b) => b.total - a.total);
    const pool = all.slice(0, 9);
    const start = (shuffleSeed * k) % Math.max(pool.length - k + 1, 1);
    return pool.slice(start, start + k).map((opt) => ({
      total: opt.total,
      seats: ms.map((m, i) => ({ name: m.name, uuid: m.uuid, role: opt.order[i], ...m.scores[opt.order[i]] })),
    }));
  }

  let shuffleSeed = 0;
  function lanePickFor(seat, optIdx, seatIdx, depth) {
    // Sort by win rate (like the meta board) so the high-win-rate picks — including
    // winning sleepers such as support Wraith — surface here too, not just the
    // most-played heroes.
    const lane = ((META && META.roles[seat.role]) || []).slice().sort((a, b) => b.shrunkWr - a.shrunkWr);
    if (!lane.length) return '<span style="color:var(--text-2)">no meta data</span>';
    const window = Math.min(lane.length, depth);
    const pickIdx = (optIdx + seatIdx + shuffleSeed) % window;
    const h = lane[pickIdx];
    const mine = (POOLS.get(seat.uuid) || new Map()).get(h.slug);
    const note = mine && mine.games >= 30
      ? `you: ${pct(mine.shrunkWr, 0)}% · ${mine.games} games on the hero (all lanes)`
      : `field ${pct(h.shrunkWr, 0)}% · <span style="color:var(--gold)">new to you</span>`;
    return `<img class="hico" src="../img/heroes/${esc(h.slug)}.webp" alt="" onerror="this.remove()">${esc(h.name)} <span style="color:var(--text-2)">${note}</span>`;
  }

  const memberBy = new Map(s.members.map((m) => [m.uuid, m]));
  function renderPlan() {
    const selected = [...document.querySelectorAll('#who .ptoggle[aria-pressed="true"]')].map((b) => b.dataset.uuid);
    const mode = document.querySelector('#mode .seg[aria-pressed="true"]')?.dataset.v ?? 'wheel';
    document.getElementById('shuffle').style.display = '';
    const out = document.getElementById('planOut');
    const options = solveTop(selected, 3);
    if (!options) { out.innerHTML = '<div style="color:var(--text-2);font-size:.82rem;margin-top:.6rem">pick at least two players</div>'; return; }
    const bestAvg = options[0].total / options[0].seats.length;
    const isOptimal = selected.length === s.members.length && mode === 'wheel' && shuffleSeed % 3 === 0;
    const picksFor = (seat, oi, si) => mode === 'meta' ? lanePickFor(seat, oi, si, 6)
      : mode === 'any' ? lanePickFor(seat, oi, si, 99)
      : (seat.picks.map((h) => `<a href="./?hero=${esc(h.slug)}&role=${esc(seat.role)}"><img src="../img/heroes/${esc(h.slug)}.webp" onerror="this.style.visibility='hidden'">${esc(h.name)} ${pct(h.shrunkWr, 0)}%${h.games != null && h.games < 20 ? ` <span style="color:var(--gold)">· ${h.games} games</span>` : ''}</a>`).join('') || '<span style="color:var(--gold);font-size:.74rem">no 10+ game hero in this exact role — try meta or any-hero mode</span>');
    out.innerHTML = options.map((opt, oi) => {
      const avg = opt.total / opt.seats.length;
      const delta = Math.abs(Math.round((avg - bestAvg) * 1000) / 10); // per-100 gap vs the top option
      const vsA = delta < 0.05 ? 'even with the top option' : `about ${delta.toFixed(1)} fewer wins per 100 than the top option`;
      if (oi === 0) {
        // the winning option, rendered rich — this IS the optimal lineup
        // when everyone is in, wheelhouse, unshuffled
        const head = isOptimal
          ? `OPTIMAL LINEUP · all ${[1, 2, 6, 24, 120][opt.seats.length - 1] ?? ''} permutations scored${typeof s.lineupGainPer100 === 'number' && s.lineupGainPer100 >= 0.5 ? ` · <span style="color:var(--green)">worth +${s.lineupGainPer100} wins/100 vs queue habits</span>` : ''}`
          : `${shuffleSeed % 3 === 0 ? 'BEST FOR THIS GROUP' : '🎲 SHUFFLED SET'} · seats average ${pct(avg)}%`;
        return `
      <div style="margin-top:.8rem">
        <div style="font-size:.74rem; font-weight:800; color:var(--green); letter-spacing:.06em">${head}</div>
        ${opt.seats.map((seat, si) => {
          const m = memberBy.get(seat.uuid);
          const fav = m && m.favRole ? m.favRole.toLowerCase() : null;
          const isMove = fav && fav !== seat.role;
          return `
        <div class="seat">
          <div class="seathead">
            <span class="role">${esc(seat.role)}</span>
            <span class="rwr">${pct(seat.wr)}%</span>
            ${pav(seat.uuid)}${plink(seat.uuid, seat.name)}
            <span class="sgames">${seat.games} games in role</span>
          </div>
          <div class="picks">${picksFor(seat, oi, si)}</div>
          ${isMove ? `<div class="snote">not their usual queue — they normally play ${esc(fav)}, but the team wins more with them here (${pct(seat.wr)}% over ${seat.games} games in ${esc(seat.role)})</div>` : ''}
        </div>`;
        }).join('')}
        ${(() => {
          const carry = opt.seats.find((x) => x.role === 'carry'), support = opt.seats.find((x) => x.role === 'support');
          if (!carry || !support) return '';
          const rec = (s.duoLane || {})[duoKey(carry.uuid, support.uuid)];
          if (!rec) return '';
          const col = rec.winrate >= 0.53 ? 'var(--green)' : rec.winrate <= 0.48 ? 'var(--red)' : 'var(--gold)';
          return `<div class="snote" style="color:${col};margin-top:.5rem">🤝 <b>Duo lane synergy:</b> ${esc(carry.name.split(' ')[0])} + ${esc(support.name.split(' ')[0])} have won ${pct(rec.winrate, 0)}% of ${rec.games} games actually laning together as carry+support — that pairing is part of why they are seated here.</div>`;
        })()}
        ${opt.seats.length >= 3 ? '<div class="snote" style="margin-top:.5rem">Seats are scored as a set — someone can look stronger in a seat they did not get, but moving them would give up more wins in the role they leave than it adds. The carry+support pairing also weighs their real duo-lane record.</div>' : ''}
      </div>`;
      }
      return `
      <div style="margin-top:.8rem; opacity:.88">
        <div style="font-size:.74rem; font-weight:800; color:var(--text-2); letter-spacing:.06em">
          ${shuffleSeed % 3 === 0 ? '' : '🎲 '}ALSO WORKS · seats average ${pct(avg)}% · ${vsA}
        </div>
        ${opt.seats.map((seat, si) => `
          <div class="planseat">
            <span class="r">${esc(seat.role)}</span>
            <span>${plink(seat.uuid, seat.name.split(' ')[0])} <span style="color:var(--text-2);font-size:.76rem">${pct(seat.wr)}% · ${seat.games} games</span></span>
            <span class="picks-mini">${mode === 'meta' ? lanePickFor(seat, oi, si, 5)
              : mode === 'any' ? lanePickFor(seat, oi, si, 99)
              : (seat.picks.map((h) => `<img class="hico" src="../img/heroes/${esc(h.slug)}.webp" alt="" onerror="this.remove()">${esc(h.name)} ${pct(h.shrunkWr, 0)}%`).join(' · ') || '<span style="color:var(--gold)">no 10+ game hero here</span>')}</span>
          </div>`).join('')}
      </div>`;
    }).join('') + `
      <div style="font-size:.7rem;color:var(--text-2);margin-top:.4rem">
        ${mode === 'meta'
          ? 'meta mode: the lane’s top-5 meta heroes; “new to you” = under 30 of your games on it; the seat winrate shown is still your role record'
          : mode === 'any'
            ? 'any-hero mode: shuffle deals from the lane’s whole tracked roster with field winrates — comfort and meta rules off'
            : 'wheelhouse mode: heroes with 10+ of your own games in that exact role (real 5v5s); thin samples under 20 games say so'}
        · seats go to whoever wins most there, with thin role records counting less</div>`;
  }
  // who toggles: flip aria-pressed (keep at least one selected)
  document.querySelectorAll('#who .ptoggle').forEach((b) => {
    b.onclick = () => {
      const on = b.getAttribute('aria-pressed') === 'true';
      if (on && document.querySelectorAll('#who .ptoggle[aria-pressed="true"]').length <= 1) return;
      b.setAttribute('aria-pressed', String(!on));
      renderPlan();
    };
  });
  // hero pool: single-select segmented control
  document.querySelectorAll('#mode .seg').forEach((b) => {
    b.onclick = () => {
      document.querySelectorAll('#mode .seg').forEach((x) => x.setAttribute('aria-pressed', String(x === b)));
      renderPlan();
    };
  });
  document.getElementById('shuffle').onclick = () => { shuffleSeed++; renderPlan(); };
  renderPlan();

  // ── queued-together card: duo / trio toggle ──
  function renderSyn() {
    const mode = document.querySelector('#synmode input[name=syn]:checked')?.value ?? 'duo';
    // trio rows use first names so three of them fit without truncating
    const rows = mode === 'trio' && s.trios
      ? s.trios.map((t) => ({ who: t.members.map((u, i) => `${pav(u)}${plink(u, t.names[i].split(' ')[0])}`).join(' + '), winrate: t.winrate, games: t.games }))
      : s.pairs.map((p) => ({ who: `${pav(p.a)}${plink(p.a, p.aName)} + ${pav(p.b)}${plink(p.b, p.bName)}`, winrate: p.winrate, games: p.games }));
    document.getElementById('synOut').innerHTML = rows.map((r) => `
      <div class="pairrow">
        <span class="names">${r.who}</span>
        <span class="bar"><i style="width:${Math.min(100, Math.max(4, ((r.winrate - 0.4) / 0.2) * 100))}%; background:${r.winrate >= 0.53 ? 'var(--green)' : r.winrate <= 0.50 ? 'var(--red)' : 'var(--accent)'}"></i></span>
        <span class="n">${pct(r.winrate, 0)}% · ${r.games} games</span>
      </div>`).join('');
    document.getElementById('synNote').textContent = mode === 'trio'
      ? `counts ranked matches with all three on the same team, in any lanes; the other two seats may have been randoms or other members · ${s.triosNote ?? ''}`
      : 'counts any ranked match where both were on the same team, in any lanes (not duo lane); the other three seats may have been randoms';
  }
  document.querySelectorAll('#synmode input').forEach((i) => { i.onchange = renderSyn; });
  renderSyn();
  buildSubnav();
})();

// Sticky section jumper: pills generated from the page's section headers,
// scrollspy keeps the current one highlighted as you scroll.
function buildSubnav() {
  const host = document.getElementById('subnav');
  const cards = [...document.querySelectorAll('.wrap .card')].filter((c) => c.querySelector('h2'));
  host.innerHTML = cards.map((c, i) => {
    c.id = c.id || 'sec' + i;
    const h = c.querySelector('h2');
    const label = (h.childNodes[0]?.textContent || h.textContent).split('·')[0].trim().toLowerCase();
    return `<button class="snpill" data-t="${c.id}">${esc(label)}</button>`;
  }).join('');
  document.documentElement.style.setProperty('--toph', `${document.querySelector('.top')?.offsetHeight ?? 96}px`);
  const pills = [...host.querySelectorAll('.snpill')];
  pills.forEach((p) => { p.onclick = () => document.getElementById(p.dataset.t)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
  // center the active pill by scrolling the pill ROW only — letting the
  // browser scroll ancestors pans the pinch-zoom viewport on iOS
  const centerPill = (p) => host.scrollTo({ left: p.offsetLeft - host.clientWidth / 2 + p.offsetWidth / 2, behavior: 'smooth' });
  const byId = new Map(pills.map((p) => [p.dataset.t, p]));
  const io = new IntersectionObserver((es) => {
    for (const e of es) {
      if (!e.isIntersecting) continue;
      pills.forEach((p) => p.classList.toggle('active', p.dataset.t === e.target.id));
      { const p = byId.get(e.target.id); if (p) centerPill(p); }
    }
  }, { rootMargin: '-15% 0px -75% 0px' });
  cards.forEach((c) => io.observe(c));
}
</script>
