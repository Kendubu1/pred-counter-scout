<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squad report — Predecessor Scout</title>
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#12121a; --bg-2:#1a1a26; --bg-3:#22222f; --border:#2a2a3a;
    --text-0:#e8e8f0; --text-1:#a0a0b8; --text-2:#6a6a80;
    --accent:#6c5ce7; --accent-soft:rgba(108,92,231,.14);
    --green:#00c48c; --red:#ff5a5a; --gold:#f0b429; --blue:#4dabf7; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg-0); color:var(--text-0); font:15px/1.55 Inter,-apple-system,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  .top { position:sticky; top:0; z-index:10; backdrop-filter:blur(10px); background:rgba(10,10,15,.82); border-bottom:1px solid var(--border); }
  .top-inner { max-width:920px; margin:0 auto; padding:.65rem 1rem; display:flex; align-items:center; gap:.8rem; }
  .wordmark { font-weight:800; color:var(--text-0); }
  .wordmark .beta { color:var(--accent); font-size:.7rem; vertical-align:super; margin-left:.2rem; }
  .spacer { flex:1; }
  .wrap { max-width:920px; margin:0 auto; padding:1.25rem 1rem 4rem; }
  .scope {
    font-size:.7rem; color:var(--text-2); border:1px solid var(--border);
    background:var(--bg-1); border-radius:8px; padding:.45rem .7rem; margin-bottom:1rem; line-height:1.5;
  }
  .scope b { color:var(--text-1); }
  a.plink { color:inherit; text-decoration:none; border-bottom:1px dotted var(--blue); }
  a.plink:hover { color:var(--blue); }
  h1 { font-size:1.7rem; font-weight:800; }
  .sub { color:var(--text-1); margin-top:.3rem; display:flex; gap:.4rem; flex-wrap:wrap; }
  .chip { background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.13rem .62rem; font-size:.76rem; color:var(--text-1); }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; margin-top:1rem; }
  .card h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; color:var(--text-2); margin-bottom:.8rem; }
  .verdict { font-size:1rem; border-left:3px solid var(--accent); padding:.5rem .9rem; background:var(--accent-soft); border-radius:0 8px 8px 0; margin-top:.8rem; color:var(--text-1); }
  .verdict b { color:var(--text-0); }

  .lineup { width:100%; border-collapse:collapse; }
  .lineup td, .lineup th { padding:.55rem .5rem; border-bottom:1px solid var(--border); text-align:left; vertical-align:middle; }
  .lineup th { color:var(--text-2); font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; }
  .lineup .role { font-weight:800; text-transform:capitalize; color:var(--accent); }
  .lineup .move { display:inline-block; background:rgba(240,180,41,.12); border:1px solid var(--gold); color:var(--gold); border-radius:6px; font-size:.62rem; font-weight:800; padding:.05rem .35rem; margin-left:.4rem; vertical-align:middle; }
  .lineup .nums { color:var(--text-1); font-size:.8rem; font-variant-numeric:tabular-nums; }
  .picks { display:flex; gap:.5rem; }
  .picks a { display:flex; align-items:center; gap:.35rem; font-size:.76rem; color:var(--text-1); background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:.2rem .5rem; }
  .picks a:hover { border-color:var(--accent); color:var(--text-0); }
  .picks img { width:22px; height:22px; border-radius:6px; object-fit:cover; }

  .members { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:.7rem; }
  .member { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:.8rem; }
  .member .nm { font-weight:800; }
  .member .meta { font-size:.72rem; color:var(--text-2); margin-top:.1rem; }
  .member .together { font-size:.74rem; color:var(--gold); margin-top:.3rem; }
  .rolemini { display:grid; grid-template-columns:74px 1fr 96px; gap:.5rem; align-items:center; font-size:.74rem; margin-top:.3rem; }
  .rolemini .bar { height:7px; border-radius:99px; background:var(--bg-3); overflow:hidden; }
  .rolemini .bar i { display:block; height:100%; background:var(--accent); border-radius:99px; }
  .rolemini .n { text-align:right; color:var(--text-2); font-variant-numeric:tabular-nums; }
  .who { display:flex; gap:.6rem; flex-wrap:wrap; }
  .pick { display:flex; align-items:center; gap:.4rem; background:var(--bg-2); border:1px solid var(--border); border-radius:99px; padding:.3rem .8rem; font-size:.82rem; cursor:pointer; user-select:none; }
  .pick input { accent-color:var(--accent); }
  .planseat { display:grid; grid-template-columns:84px 1fr auto; gap:.7rem; align-items:center; padding:.4rem 0; border-bottom:1px solid var(--border); font-size:.86rem; }
  .planseat:last-of-type { border-bottom:none; }
  .planseat .r { font-weight:800; text-transform:capitalize; color:var(--accent); }
  .planseat .picks-mini { font-size:.74rem; color:var(--text-2); }
  .plansyn { margin-top:.6rem; font-size:.76rem; color:var(--gold); }
  .whyline { margin-top:.55rem; font-size:.76rem; color:var(--text-1); background:var(--bg-2); border:1px dashed var(--border); border-radius:8px; padding:.45rem .65rem; }
  .pairrow { display:grid; grid-template-columns:minmax(170px, 240px) 1fr 96px; gap:.7rem; align-items:center; padding:.3rem 0; font-size:.82rem; }
  .pairrow .names { color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pairrow .bar { height:8px; border-radius:99px; background:var(--bg-2); overflow:hidden; }
  .pairrow .bar i { display:block; height:100%; border-radius:99px; }
  .pairrow .n { text-align:right; color:var(--text-2); font-variant-numeric:tabular-nums; font-size:.76rem; }
  ul.notes { padding-left:1.1rem; }
  ul.notes li { margin:.45rem 0; color:var(--text-1); }
  footer { margin-top:2rem; font-size:.72rem; color:var(--text-2); line-height:1.7; }

  /* ── mobile: smaller, stacked, nothing bleeds ── */
  @media (max-width:600px) {
    body { font-size:13.5px; }
    .wrap { padding:.9rem .7rem 3rem; }
    h1 { font-size:1.35rem; }
    .sub .chip { font-size:.66rem; padding:.1rem .5rem; }
    .card { padding:.8rem .8rem; }
    .card h2 { font-size:.7rem; }
    .verdict { font-size:.84rem; padding:.4rem .7rem; }
    .whyline { font-size:.7rem; padding:.4rem .55rem; }

    /* lineup table -> stacked seat cards */
    .lineup .lu-head { display:none; }
    .lineup, .lineup tbody { display:block; }
    .lineup tr { display:grid; grid-template-columns:auto 1fr; gap:.05rem .6rem; padding:.55rem 0; border-bottom:1px solid var(--border); align-items:baseline; }
    .lineup tr:last-child { border-bottom:none; }
    .lineup td { display:block; padding:0; border:none; }
    .lineup td.role { font-size:.8rem; }
    .lineup td.lu-player { font-size:.86rem; }
    .lineup td.lu-record { grid-column:2; font-size:.72rem; text-align:left; }
    .lineup td.lu-picks { grid-column:1 / -1; margin-top:.3rem; }
    .picks { flex-wrap:wrap; gap:.35rem; }
    .picks a { font-size:.7rem; padding:.16rem .4rem; }
    .picks img { width:18px; height:18px; }
    .move { font-size:.56rem; }

    /* planner */
    .pick { font-size:.74rem; padding:.24rem .6rem; }
    .planseat { grid-template-columns:64px 1fr; gap:.1rem .5rem; padding:.45rem 0; font-size:.8rem; }
    .planseat .picks-mini { grid-column:1 / -1; font-size:.68rem; }
    .plansyn { font-size:.68rem; }

    /* duo synergy rows */
    .pairrow { grid-template-columns:1fr 84px; gap:.2rem .5rem; }
    .pairrow .names { grid-column:1 / -1; font-size:.76rem; }
    .pairrow .n { font-size:.68rem; }

    /* member cards */
    .members { grid-template-columns:1fr; gap:.55rem; }
    .member { padding:.65rem; }
    .member .nm { font-size:.92rem; }
    .rolemini { grid-template-columns:62px 1fr 86px; font-size:.68rem; }
    ul.notes li { font-size:.8rem; }
  }
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <span class="wordmark">⚔ Predecessor Scout<span class="beta">SQUAD</span></span>
  <span class="spacer"></span>
  <a href="coach.html">solo coach</a>
  <a href="./">build lab →</a>
</div></div>
<div class="wrap" id="page">loading…</div>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (x, d = 1) => (x * 100).toFixed(d);
(async () => {
  let s, coach = null, META = null;
  try { s = await (await fetch('../../data/artifacts/squad.json')).json(); }
  catch { document.getElementById('page').textContent = 'no squad report generated yet'; return; }
  try { coach = await (await fetch('../../data/artifacts/coach.json')).json(); } catch {}
  try { META = await (await fetch('../../data/artifacts/meta.json')).json(); } catch {}
  // full hero pools per member, for honest meta-pick annotations (static files, no API)
  const POOLS = new Map();
  await Promise.all(s.members.map(async (m) => {
    try {
      const p = await (await fetch(`../../data/artifacts/players/${m.uuid}.json`)).json();
      POOLS.set(m.uuid, new Map(p.pool.map((h) => [h.slug, h])));
    } catch { POOLS.set(m.uuid, new Map()); }
  }));

  const lead = s.members[0];
  const leadAssigned = s.assignment.find((a) => a.uuid === s.lead);
  let tension = '';
  if (coach && leadAssigned) {
    const soloBest = coach.roles.filter((r) => r.games >= 100)[0];
    if (soloBest && soloBest.role !== leadAssigned.role) {
      const mate = s.assignment.find((a) => a.role === soloBest.role);
      tension = `<b>Solo queue → ${esc(soloBest.role)}.</b> It is your best role (${pct(soloBest.shrunkWr)}%). <b>Five-stack → ${esc(leadAssigned.role)}.</b> ${esc(mate ? mate.name : '?')} out-records you in ${esc(soloBest.role)} (${mate ? pct(mate.roleWr) + '% over ' + mate.roleGames + 'g' : ''}), so the team wins more with you covering ${esc(leadAssigned.role)} (${pct(leadAssigned.roleWr)}% over ${leadAssigned.roleGames}g).`;
    }
  }

  const plink = (uuid, name) => `<a class="plink" href="coach.html?player=${esc(uuid)}">${esc(name)}</a>`;

  document.getElementById('page').innerHTML = `
    <div class="scope">📊 <b>Data scope:</b> pred.gg public profiles — career, ranked splits, last 40 matches each · field baselines: ${META ? META.matches.toLocaleString() + ' matches, patch ' + esc(META.patch) : 'current-patch matches'}, all ranks · combat math is THEORY pending in-game calibration · generated ${esc(s.generatedAt.slice(0, 16).replace('T', ' '))} UTC</div>
    <h1>The five stack</h1>
    <div class="sub">${s.members.map((m) => `<span class="chip">${plink(m.uuid, m.name)}${m.current ? ` · ${esc(m.current.rank)} ${m.current.points}VP` : ''}</span>`).join('')}</div>

    <div class="card">
      <h2>Optimal lineup · all 120 permutations scored${typeof s.lineupGainPer100 === 'number' && s.lineupGainPer100 >= 0.5 ? ` · <span style="color:var(--green)">worth +${s.lineupGainPer100} wins/100 vs queue habits</span>` : ''}</h2>
      <table class="lineup">
        <tr class="lu-head"><th>seat</th><th>player</th><th>role record</th><th>play these</th></tr>
        ${s.assignment.map((a) => `
          <tr>
            <td class="role">${esc(a.role)}</td>
            <td class="lu-player">${plink(a.uuid, a.name)}${a.isMove ? '<span class="move">MOVE</span>' : ''}</td>
            <td class="nums lu-record">${pct(a.roleWr)}% · ${a.roleGames}g${a.isMove && a.favRole ? `<br><span style="font-size:.68rem">queues ${esc(a.favRole)} today</span>` : ''}</td>
            <td class="lu-picks"><div class="picks">${a.heroPicks.map((h) => `<a href="./?hero=${esc(h.slug)}"><img src="../img/heroes/${esc(h.slug)}.webp" onerror="this.style.visibility='hidden'">${esc(h.name)} ${pct(h.shrunkWr, 0)}%</a>`).join('') || '<span style="color:var(--text-2);font-size:.74rem">no 30+ game hero in role — pick from the meta board</span>'}</div></td>
          </tr>`).join('')}
      </table>
      ${tension ? `<div class="verdict">${tension}</div>` : ''}
      <div id="fullWhys"></div>
    </div>

    <div class="card">
      <h2>Tonight's stack · pick who's queueing, choose your flavor</h2>
      <div class="who" id="who">
        ${s.members.map((m) => `<label class="pick"><input type="checkbox" data-uuid="${m.uuid}" checked> ${esc(m.name)}</label>`).join('')}
      </div>
      <div class="who" id="mode" style="margin-top:.55rem">
        <label class="pick"><input type="radio" name="mode" value="wheel" checked> 🏠 our wheelhouse</label>
        <label class="pick"><input type="radio" name="mode" value="meta"> 🔥 meta team</label>
        <button id="shuffle" class="pick" style="display:none">🎲 shuffle</button>
      </div>
      <div id="planOut"></div>
    </div>

    <div class="card">
      <h2>Duo synergy · ranked games together</h2>
      ${s.pairs.map((p) => `
        <div class="pairrow">
          <span class="names">${plink(p.a, p.aName)} + ${plink(p.b, p.bName)}</span>
          <span class="bar"><i style="width:${Math.max(4, ((p.winrate - 0.4) / 0.2) * 100)}%; background:${p.winrate >= 0.53 ? 'var(--green)' : p.winrate <= 0.50 ? 'var(--red)' : 'var(--accent)'}"></i></span>
          <span class="n">${pct(p.winrate, 0)}% · ${p.games}g</span>
        </div>`).join('')}
      <div style="font-size:.72rem;color:var(--text-2);margin-top:.5rem">pair games include matches where the other seats were randoms</div>
    </div>

    <div class="card">
      <h2>The members</h2>
      <div class="members">
        ${s.members.map((m) => `
          <div class="member">
            <div class="nm"><a href="coach.html?player=${esc(m.uuid)}">${esc(m.name)} →</a></div>
            ${m.archetype ? `<div style="color:var(--gold);font-size:.72rem;font-weight:700" title="${esc(m.archetype.receipt)}">“${esc(m.archetype.label)}”</div>` : ''}
            ${m.topInsight ? `<div style="font-size:.72rem;color:var(--text-1);margin-top:.25rem" title="${esc(m.topInsight.receipt)}">🎬 ${esc(m.topInsight.title)}</div>` : ''}
            <div class="meta">${m.career.games.toLocaleString()} games · ${pct(m.career.winrate)}% career · KDA ${m.career.kda.toFixed(2)}${m.peakAllTime ? ` · peak ${m.peakAllTime} VP` : ''}</div>
            ${m.together ? `<div class="together">${m.together.games} ranked games with ${esc(lead.name)} · ${pct(m.together.winrate, 0)}% together</div>` : '<div class="together">stack lead</div>'}
            ${m.roles.slice(0, 3).map((r) => `
              <div class="rolemini"><span style="text-transform:capitalize">${esc(r.role)}</span>
                <span class="bar"><i style="width:${Math.min(100, (r.shrunkWr / 0.6) * 100)}%"></i></span>
                <span class="n">${pct(r.shrunkWr)}% · ${r.games}g</span></div>`).join('')}
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Coach notes</h2>
      <ul class="notes">${s.notes.map((n) => `<li>${esc(n)}</li>`).join('')}</ul>
    </div>

    <footer>
      Data: pred.gg public profiles, ranked common-teammate records (${esc(s.generatedAt.slice(0, 10))}).<br>
      ${s.honesty.map(esc).join(' · ')}
    </footer>`;

  // ── the "why": opportunity-cost receipts for contested seats ──
  // A seat is contested when another selected player has a higher record
  // in that role. The receipt shows what the obvious swap would cost.
  const scoreOf = (uuid, role) => s.roleScores.find((r) => r.uuid === uuid).scores[role];
  function whyLines(seats) {
    const lines = [];
    for (const seat of seats) {
      const mine = scoreOf(seat.uuid, seat.role);
      let top = null;
      for (const other of seats) {
        if (other.uuid === seat.uuid) continue;
        const theirs = scoreOf(other.uuid, seat.role);
        if (theirs.wr > mine.wr + 0.002 && (!top || theirs.wr > scoreOf(top.uuid, seat.role).wr)) top = other;
      }
      if (!top) continue;
      const cur = mine.score + scoreOf(top.uuid, top.role).score;
      const swapped = scoreOf(seat.uuid, top.role).score + scoreOf(top.uuid, seat.role).score;
      const cost = (cur - swapped) * 100;
      if (cost <= 0) continue; // the optimizer would have swapped already
      const t = scoreOf(top.uuid, seat.role);
      const tHome = scoreOf(top.uuid, top.role);
      const meAfter = scoreOf(seat.uuid, top.role);
      const sn = seat.name.split(' ')[0];
      const tn = top.name.split(' ')[0];
      lines.push(`${tn} is the better ${seat.role} (${pct(t.wr)}% vs ${sn}'s ${pct(mine.wr)}%) — so why ${sn}? Because the swap is two moves, not one: ${tn} would leave ${top.role}, where they're ${pct(tHome.wr)}% (${tHome.games}g), and ${sn} would take over ${top.role} at only ${pct(meAfter.wr)}%. Net for the team: −${cost.toFixed(1)} points. ${sn} stays.`);
    }
    return lines;
  }

  // ── partial-stack planner: best roles for whoever is queueing tonight ──
  const ROLES = ['carry', 'midlane', 'offlane', 'jungle', 'support'];
  const perms = (arr, k) => k === 0 ? [[]] :
    arr.flatMap((x, i) => perms([...arr.slice(0, i), ...arr.slice(i + 1)], k - 1).map((rest) => [x, ...rest]));

  function solveTop(selected, k = 3) {
    const ms = s.roleScores.filter((r) => selected.includes(r.uuid));
    if (ms.length < 2) return null;
    const all = perms(ROLES, ms.length).map((order) => ({
      order,
      total: order.reduce((sum, role, i) => sum + ms[i].scores[role].score, 0),
    })).sort((a, b) => b.total - a.total);
    return all.slice(0, k).map((opt) => ({
      total: opt.total,
      seats: ms.map((m, i) => ({ name: m.name, uuid: m.uuid, role: opt.order[i], ...m.scores[opt.order[i]] })),
    }));
  }

  let shuffleSeed = 0;
  function metaPickFor(seat, optIdx, seatIdx) {
    const lane = (META && META.roles[seat.role]) || [];
    if (!lane.length) return '<span style="color:var(--text-2)">no meta data</span>';
    const pickIdx = (optIdx + seatIdx + shuffleSeed) % Math.min(lane.length, 5);
    const h = lane[pickIdx];
    const mine = (POOLS.get(seat.uuid) || new Map()).get(h.slug);
    const note = mine && mine.games >= 30
      ? `you: ${pct(mine.shrunkWr, 0)}%/${mine.games}g`
      : `field ${pct(h.shrunkWr, 0)}% · <span style="color:var(--gold)">new to you</span>`;
    return `${esc(h.name)} <span style="color:var(--text-2)">${note}</span>`;
  }

  function renderPlan() {
    const selected = [...document.querySelectorAll('#who input[type=checkbox]:checked')].map((i) => i.dataset.uuid);
    const mode = document.querySelector('#mode input[name=mode]:checked').value;
    document.getElementById('shuffle').style.display = mode === 'meta' ? '' : 'none';
    const out = document.getElementById('planOut');
    const options = solveTop(selected, 3);
    if (!options) { out.innerHTML = '<div style="color:var(--text-2);font-size:.82rem;margin-top:.6rem">pick at least two players</div>'; return; }
    const synPairs = s.pairs.filter((p) => selected.includes(p.a) && selected.includes(p.b));
    const bestAvg = options[0].total / options[0].seats.length;
    out.innerHTML = options.map((opt, oi) => {
      const avg = opt.total / opt.seats.length;
      const delta = (avg - bestAvg) * 100;
      return `
      <div style="margin-top:.8rem; ${oi > 0 ? 'opacity:.88' : ''}">
        <div style="font-size:.74rem; font-weight:800; color:${oi === 0 ? 'var(--green)' : 'var(--text-2)'}; letter-spacing:.06em">
          OPTION ${'ABC'[oi]} · avg seat ${pct(avg)}%${oi > 0 ? ` (${delta.toFixed(1)} vs A)` : ' · best'}
        </div>
        ${opt.seats.map((seat, si) => `
          <div class="planseat">
            <span class="r">${esc(seat.role)}</span>
            <span>${plink(seat.uuid, seat.name)} <span style="color:var(--text-2);font-size:.76rem">${pct(seat.wr)}% · ${seat.games}g</span></span>
            <span class="picks-mini">${mode === 'meta'
              ? metaPickFor(seat, oi, si)
              : (seat.picks.map((h) => `${esc(h.name)} ${pct(h.shrunkWr, 0)}%`).join(' · ') || '<span style="color:var(--gold)">no 30+ game hero here — flip to meta mode</span>')}</span>
          </div>`).join('')}
      </div>`;
    }).join('') + `
      ${whyLines(options[0].seats).map((l) => `<div class="whyline">🧾 ${esc(l)}</div>`).join('')}
      ${synPairs.length ? `<div class="plansyn">duos in this group: ${synPairs.map((p) => `${esc(p.aName.split(' ')[0])}+${esc(p.bName.split(' ')[0])} ${pct(p.winrate, 0)}%/${p.games}g`).join(' · ')}</div>` : ''}
      <div style="font-size:.7rem;color:var(--text-2);margin-top:.4rem">
        ${mode === 'meta'
          ? 'meta mode: heroes from the current patch meta board per lane; “new to you” = under 30 games on it, the seat winrate shown is still your role record'
          : 'wheelhouse mode: only heroes with 30+ of your own games in that role'}
        · seat assignments maximize confidence-weighted role winrates</div>`;
  }
  document.querySelectorAll('#who input, #mode input').forEach((i) => { i.onchange = renderPlan; });
  document.getElementById('shuffle').onclick = () => { shuffleSeed++; renderPlan(); };
  renderPlan();

  // Receipts for the full five-stack lineup above.
  const fullSeats = s.assignment.map((a) => ({ uuid: a.uuid, name: a.name, role: a.role }));
  document.getElementById('fullWhys').innerHTML =
    whyLines(fullSeats).map((l) => `<div class="whyline">🧾 ${esc(l)}</div>`).join('');
})();
</script>
</body>
</html>
