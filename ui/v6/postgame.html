<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post-game review — Predecessor Scout</title>
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#12121a; --bg-2:#1a1a26; --bg-3:#22222f; --border:#2a2a3a;
    --text-0:#e8e8f0; --text-1:#a0a0b8; --text-2:#82829a;
    --accent:#6c5ce7; --accent-soft:rgba(108,92,231,.14);
    --green:#00c48c; --red:#ff5a5a; --gold:#f0b429; --blue:#4dabf7; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg-0); color:var(--text-0); font:15px/1.55 Inter,-apple-system,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  .top { position:sticky; top:0; z-index:10; backdrop-filter:blur(14px); background:rgba(10,10,15,.78); border-bottom:1px solid var(--border); }
  .top-inner { max-width:960px; margin:0 auto; padding:.6rem 1rem; display:flex; align-items:center; gap:.45rem; }
  .wordmark { font-weight:800; color:var(--text-0); }
  .spacer { flex:1; }
  .navlink { padding:.2rem .7rem; border-radius:99px; color:var(--text-1); border:1px solid transparent; white-space:nowrap; }
  .navlink.active { background:var(--accent-soft); color:var(--text-0); border-color:var(--accent); }
  main { max-width:960px; margin:0 auto; padding:1rem; }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.1rem; margin-bottom:1rem; }
  h1 { font-size:1.3rem; } h2 { font-size:1.02rem; margin-bottom:.5rem; }
  .hint { font-weight:400; font-size:.72rem; color:var(--text-2); }
  .matchhead { display:flex; align-items:center; gap:.7rem; flex-wrap:wrap; }
  .res { font-weight:800; padding:.2rem .7rem; border-radius:8px; font-size:.95rem; }
  .res.win { background:rgba(0,196,140,.16); color:var(--green); }
  .res.loss { background:rgba(255,90,90,.16); color:var(--red); }
  .meta { color:var(--text-1); font-size:.84rem; }
  .theory { margin-left:auto; font-size:.62rem; font-weight:700; letter-spacing:.04em; color:var(--gold); border:1px solid var(--gold); border-radius:99px; padding:.1rem .5rem; }
  .headline { font-size:1.05rem; font-weight:700; line-height:1.45; }
  .teamrev { color:var(--text-1); margin-top:.5rem; font-size:.92rem; }
  .shift { border-left:3px solid var(--gold); padding:.5rem .8rem; background:rgba(240,180,41,.07); border-radius:6px; margin-top:.6rem; font-size:.9rem; }
  table.lanes { width:100%; border-collapse:collapse; font-size:.85rem; }
  table.lanes td, table.lanes th { padding:.4rem .3rem; border-bottom:1px solid var(--border); text-align:left; }
  .edge { font-weight:700; font-size:.72rem; padding:.1rem .45rem; border-radius:99px; }
  .edge.favored { background:rgba(0,196,140,.16); color:var(--green); }
  .edge.unfavored { background:rgba(255,90,90,.16); color:var(--red); }
  .edge.even { background:var(--bg-3); color:var(--text-1); }
  .dots { display:inline-flex; gap:3px; }
  .dot { width:11px; height:11px; border-radius:50%; }
  .dot.y { background:var(--green); } .dot.e { background:var(--red); } .dot.x { background:var(--bg-3); border:1px solid var(--border); }
  .hicon { width:30px; height:30px; border-radius:7px; object-fit:cover; background:var(--bg-2); vertical-align:middle; }
  .pcard { border:1px solid var(--border); border-radius:10px; padding:.7rem .8rem; margin-bottom:.7rem; background:var(--bg-2); }
  .phead { display:flex; align-items:center; gap:.55rem; flex-wrap:wrap; }
  .pname { font-weight:700; } .prole { font-size:.68rem; text-transform:uppercase; letter-spacing:.04em; color:var(--text-2); border:1px solid var(--border); border-radius:99px; padding:.05rem .4rem; }
  .stat { font-size:.8rem; color:var(--text-1); }
  .badge { font-size:.68rem; padding:.05rem .4rem; border-radius:99px; }
  .badge.exp { background:var(--accent-soft); color:var(--text-0); }
  .badge.flag { background:rgba(255,90,90,.14); color:var(--red); }
  .items { display:flex; gap:.25rem; flex-wrap:wrap; margin:.4rem 0; }
  .iitem { width:26px; height:26px; border-radius:6px; object-fit:cover; background:var(--bg-1); border:1px solid var(--border); }
  .missing { font-size:.74rem; color:var(--gold); }
  .advice { font-size:.9rem; color:var(--text-0); margin-top:.45rem; border-left:2px solid var(--accent); padding-left:.6rem; }
  .picker { display:flex; gap:.4rem; flex-wrap:wrap; }
  .pick { font-size:.78rem; padding:.25rem .6rem; border:1px solid var(--border); border-radius:8px; background:var(--bg-2); color:var(--text-1); cursor:pointer; }
  .pick.active { border-color:var(--accent); color:var(--text-0); }
  .empty { color:var(--text-2); font-size:.9rem; }
  code { background:var(--bg-3); padding:.1rem .35rem; border-radius:4px; font-size:.8rem; }
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <a class="wordmark" href="./">⚔ Predecessor Scout</a>
  <span class="spacer"></span>
  <a class="navlink" href="./">Build Lab</a>
  <a class="navlink" href="squad.html">Squad</a>
  <a class="navlink active" href="postgame.html">Post-game</a>
  <a class="navlink" href="coach.html">Coach</a>
</div></div>
<main id="main">loading…</main>

<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const himg = (slug) => `../img/heroes/${slug}.webp`;
const iimg = (slug) => `../img/items/${slug}.webp`;
async function getJson(u) { const r = await fetch(u); if (!r.ok) throw new Error(u); return r.json(); }

function dots(verdict) {
  return `<span class="dots">${[...verdict].map((c) => `<span class="dot ${c === 'y' ? 'y' : c === 'e' ? 'e' : 'x'}" title="${c === 'y' ? 'your kill window' : c === 'e' ? 'their kill window' : 'even'}"></span>`).join('')}</span>`;
}

function playerCard(p, coachLine) {
  const built = p.items.filter((i) => !/Potion|Ward|Crest/i.test(i.name));
  return `
  <div class="pcard">
    <div class="phead">
      <img class="hicon" src="${himg(p.heroSlug)}" onerror="this.style.visibility='hidden'">
      <span class="pname">${esc(p.name)}</span>
      <span class="prole">${esc(p.role)}</span>
      <span class="stat">${esc(p.heroName)} · ${p.kills}/${p.deaths}/${p.assists} · perf ${p.performanceScore}${p.perfVsAvg != null ? ` (${p.perfVsAvg >= 0 ? '+' : ''}${p.perfVsAvg} vs avg)` : ''}</span>
      <span class="badge exp">${esc(p.experienceVerdict)}</span>
      ${p.matchupItemFlags.map((f) => `<span class="badge flag">⚠ ${esc(f)}</span>`).join('')}
    </div>
    <div class="items">${built.map((i) => `<img class="iitem" src="${iimg(i.slug)}" title="${esc(i.name)}" onerror="this.style.visibility='hidden'">`).join('') || '<span class="empty">no completed items recorded</span>'}</div>
    ${p.missingCore.length ? `<div class="missing">missing from the optimal / field core: ${p.missingCore.map(esc).join(', ')}</div>` : ''}
    ${coachLine ? `<div class="advice">${esc(coachLine)}</div>` : ''}
  </div>`;
}

function render(f) {
  const us = f.players.filter((p) => p.us);
  const coaching = f.coaching;
  const date = new Date(f.startTime).toLocaleDateString();
  $('#main').innerHTML = `
    <div class="card">
      <div class="matchhead">
        <span class="res ${f.result}">${f.result.toUpperCase()}</span>
        <span class="meta">${f.durationMin} min · ${esc(f.mode)} · ${date} · team ${esc(f.ourTeam)}${f.vpSwing != null ? ` · VP ${f.vpSwing >= 0 ? '+' : ''}${f.vpSwing}` : ''}</span>
        <span class="theory">THEORY</span>
      </div>
      ${coaching ? `<div class="headline" style="margin-top:.7rem">${esc(coaching.headline)}</div>
      <div class="teamrev">${esc(coaching.team)}</div>
      <div class="shift"><b>What would've shifted it:</b> ${esc(coaching.whatShiftedIt)}</div>` :
      `<div class="empty" style="margin-top:.6rem">Facts computed. Coaching narrative not yet authored for this match (run the agent coaching pass).</div>`}
    </div>

    <div class="card">
      <h2>Draft &amp; lane matchups <span class="hint">our kit-math kill-window per checkpoint minute · green = our window, red = theirs</span></h2>
      <table class="lanes"><tr><th>Lane</th><th>Us</th><th>Them</th><th>Edge</th><th>5·10·15·20·25·30</th><th></th></tr>
      ${f.lanes.map((l) => `<tr>
        <td>${esc(l.role)}</td>
        <td><img class="hicon" src="${himg(l.ourSlug)}" onerror="this.style.display='none'"> ${esc(l.ourHero)}</td>
        <td><img class="hicon" src="${himg(l.theirSlug)}" onerror="this.style.display='none'"> ${esc(l.theirHero)}</td>
        <td><span class="edge ${l.edge}">${l.edge}</span></td>
        <td>${dots(l.verdict)}</td>
        <td class="hint">${esc(l.summary)}</td>
      </tr>`).join('')}
      </table>
    </div>

    <div class="card">
      <h2>Team comp &amp; objectives</h2>
      <div class="stat">Damage mix — us: ${f.comp.ourDamage.physical} physical / ${f.comp.ourDamage.magical} magical · them: ${f.comp.theirDamage.physical} physical / ${f.comp.theirDamage.magical} magical</div>
      <div class="stat">Frontline — us: ${f.comp.ourFrontline ? 'yes' : 'no'} · them: ${f.comp.theirFrontline ? 'yes' : 'no'} · healers — us: ${f.comp.ourHealers.join(', ') || 'none'} · them: ${f.comp.theirHealers.join(', ') || 'none'}</div>
      <div class="stat">Objectives — us: ${f.objectives.ourKills} kills / ${f.objectives.ourObjDamage.toLocaleString()} dmg · them: ${f.objectives.theirKills} / ${f.objectives.theirObjDamage.toLocaleString()} dmg</div>
      ${f.comp.flags.length ? `<div class="missing" style="margin-top:.4rem">${f.comp.flags.map((x) => '• ' + esc(x)).join('<br>')}</div>` : ''}
    </div>

    <div class="card">
      <h2>Per-player review <span class="hint">build vs our optimizer + field core · experience vs this game · blunt notes</span></h2>
      ${us.map((p) => playerCard(p, coaching?.perPlayer?.[p.pid])).join('')}
    </div>

    <div class="card">
      <div class="hint">Match data: official Omeda public API (omeda.city). Kill-window edges and optimal builds are our kit-math sim — THEORY until calibrated. No objective timeline is available from the feed; objective contribution is measured by kills + damage, not timing.</div>
    </div>`;
}

async function route() {
  const params = new URLSearchParams(location.search);
  let id = params.get('match');
  let index = null;
  try { index = await getJson('../../data/postgame/index.json'); } catch { index = { matches: [] }; }
  if (!id && index.matches.length) id = index.matches[0].matchId;

  const picker = index.matches.length > 1 ? `<div class="card"><h2>Your reviewed matches</h2><div class="picker">${index.matches.map((m) => `<a class="pick ${m.matchId === id ? 'active' : ''}" href="postgame.html?match=${m.matchId}">${new Date(m.startTime).toLocaleDateString()} · <b style="color:${m.result === 'win' ? 'var(--green)' : 'var(--red)'}">${m.result.toUpperCase()}</b> · ${m.durationMin}m</a>`).join('')}</div></div>` : '';

  if (!id) {
    $('#main').innerHTML = `<div class="card"><h1>Post-game review</h1><div class="empty" style="margin-top:.5rem">No reviewed matches yet. Generate one with <code>npm run postgame -- &lt;your-name | match-id&gt;</code>, then run the coaching pass. Reviews are committed under <code>data/postgame/</code> and appear here.</div></div>`;
    return;
  }
  try {
    const f = await getJson(`../../data/postgame/${id}.json`);
    render(f);
    if (picker) $('#main').insertAdjacentHTML('beforeend', picker);
  } catch {
    $('#main').innerHTML = `<div class="card"><div class="empty">Could not load review for ${esc(id)}.</div></div>${picker}`;
  }
}
window.onpopstate = route;
route();
</script>
</body>
</html>
