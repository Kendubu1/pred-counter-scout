<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pred Scout">
  <defs>
    <linearGradient id="ps-crys" x1="20" y1="8" x2="44" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d8d2f7"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="ps-pur" x1="20" y1="30" x2="44" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b7cf0"/>
      <stop offset="1" stop-color="#5b4bd6"/>
    </linearGradient>
  </defs>
  <!-- compass ring -->
  <circle cx="32" cy="33" r="24" fill="none" stroke="#6c5ce7" stroke-width="2" opacity="0.55"/>
  <!-- ring ticks -->
  <g stroke="#6c5ce7" stroke-width="2" opacity="0.7" stroke-linecap="round">
    <line x1="14" y1="24" x2="17" y2="26"/><line x1="50" y1="24" x2="47" y2="26"/>
    <line x1="14" y1="42" x2="17" y2="40"/><line x1="50" y1="42" x2="47" y2="40"/>
  </g>
  <!-- N/E/S/W arrow points -->
  <g fill="#8b7cf0">
    <path d="M32 3 l5 9 h-10 z"/>
    <path d="M61 33 l-9 5 v-10 z"/>
    <path d="M32 63 l-5 -9 h10 z" fill="#6c5ce7"/>
    <path d="M3 33 l9 -5 v10 z"/>
  </g>
  <!-- faceted crystal: white top, purple base, center facet -->
  <path d="M32 9 L43 30 L32 42 L21 30 Z" fill="url(#ps-crys)"/>
  <path d="M21 30 L32 42 L43 30 L38.5 45 L32 57 L25.5 45 Z" fill="url(#ps-pur)"/>
  <path d="M32 9 L32 57" stroke="#ffffff" stroke-width="1.1" opacity="0.5"/>
  <path d="M21 30 L43 30" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
</svg>
