<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Build Lab — Predecessor Scout (editorial)</title>
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design.css">
</head>
<body>

<header class="topbar">
  <div class="brand"><button class="menu-btn" aria-label="Menu"><span></span></button></div>
  <div class="title">BUILD LAB</div>
  <div class="right"><span class="brand-mark right">PS · V5</span></div>
</header>

<main class="wrap">

  <div class="picker">
    <div class="sel"><select id="heroSel" aria-label="Hero"></select></div>
    <div class="sel"><select id="roleSel" aria-label="Role"></select></div>
  </div>

  <section id="heroBox"></section>

  <div class="section-head">
    <span class="label">Built for the kit</span>
    <span class="sub">Crest + 5 items</span>
  </div>
  <section id="buildBox"><div class="loading">Loading engine…</div></section>

  <p class="note">
    Scored from <b>this hero's own kit</b> — its attributes, damage type, and traits matched
    against item stats. <b>Not</b> the most-played build. Tap <span style="color:var(--gold);font-weight:700;letter-spacing:.18em">WHY</span> on any item for the reasoning.
  </p>

  <footer class="footer">
    <span>Predecessor Scout</span>
    <span>EDITORIAL · V5</span>
  </footer>

</main>

<script src="../build-engine.js"></script>
<script>
const DATA = '../../data/game-data';
let profiles = {}, profileList = [], items = [];

const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const slugify = s => String(s).toLowerCase().replace(/[’.']/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
const titleCase = s => String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());

// Keep stat grid scannable — show the 4 most-loaded stats per item.
function topStats(stats, n = 4) {
  return (stats || []).slice(0, n).map(s => {
    const m = String(s).match(/^(.*?)\s+(\d[\d.]*)$/);
    if (!m) return { k: titleCase(s), v: '' };
    return { k: titleCase(m[1].replace(/_/g, ' ')), v: m[2] };
  });
}

async function boot() {
  try {
    const [p, it] = await Promise.all([
      fetch(`${DATA}/hero-profiles.json`).then(r => r.json()),
      fetch(`${DATA}/items.json`).then(r => r.json()),
    ]);
    profileList = p.sort((a, b) => a.name.localeCompare(b.name));
    profileList.forEach(h => profiles[h.slug] = h);
    items = it.items || it;
    BuildEngine.items = items;

    const hSel = document.getElementById('heroSel');
    hSel.innerHTML = profileList.map(h => `<option value="${h.slug}">${esc(h.name.toUpperCase())}</option>`).join('');
    hSel.value = 'wraith';
    hSel.onchange = onHero;
    document.getElementById('roleSel').onchange = render;
    onHero();
  } catch (e) {
    document.getElementById('buildBox').innerHTML = `<div class="loading">Couldn't fetch data — serve over http (e.g. <span style="color:var(--gold)">python3 -m http.server</span>), not file://</div>`;
  }
}

function onHero() {
  const hero = profiles[document.getElementById('heroSel').value];
  const rSel = document.getElementById('roleSel');
  const roles = (hero.roles || ['ALL']);
  rSel.innerHTML = roles.map(r => `<option value="${r}">${r}</option>`).join('');
  render();
}

function itemIconHTML(it) {
  const src = `../img/items/${slugify(it.name)}.webp`;
  const initials = it.name.split(' ').map(w => w[0]).slice(0, 2).join('');
  return `<img class="row-ico" src="${src}" alt="" loading="lazy" onerror="this.outerHTML='<span class=&quot;row-ico fallback&quot;>${esc(initials)}</span>'">`;
}

function rowHTML(it, slot) {
  const reasons = (it.why || []).map(w => `<li>${esc(w)}</li>`).join('');
  const stats = topStats(it.stats, 4);
  const grid = stats.map(s =>
    `<div class="stat-cell"><span class="v">${esc(s.v)}</span><span class="k">${esc(s.k)}</span></div>`
  ).join('');
  return `<div class="row">
    <div class="row-head">
      ${itemIconHTML(it)}
      <div class="row-meta">
        <div class="row-name">${esc(it.name)}</div>
        <div class="row-sub">${slot ? esc(slot) + ' · ' : ''}EPIC</div>
      </div>
      ${slot === 'CREST' ? `<span class="row-tag">CREST</span>` : ''}
    </div>
    <div class="stat-grid${stats.length === 3 ? ' cols-3' : stats.length === 2 ? ' cols-2' : ''}">${grid}</div>
    ${reasons ? `<details class="why"><summary>Why</summary><ul class="reasons">${reasons}</ul></details>` : ''}
  </div>`;
}

function render() {
  const hero = profiles[document.getElementById('heroSel').value];
  const role = document.getElementById('roleSel').value;
  const r = BuildEngine.recommend(hero, role, items);
  const a = hero.attributes || {};

  const traitChips = (hero.baseTraits || []).map(t => {
    const key = /lifesteal|on_hit|as_steroid|stealth|execute|shield/.test(t);
    return `<span class="trait${key ? ' key' : ''}">${esc(t.replace(/_/g, ' '))}</span>`;
  }).join('');

  document.getElementById('heroBox').innerHTML = `
    <div class="hh">
      <div class="hh-top">
        <img class="hh-portrait" src="../img/heroes/${hero.slug}.webp" alt="" onerror="this.style.visibility='hidden'">
        <div class="hh-name">
          <h1>${esc(hero.name)}</h1>
          <div class="hh-meta"><span>${esc(role)}</span><span class="sep">·</span><span class="dmg">${esc(hero.damageType)}</span><span class="sep">·</span><span>${(hero.classes || []).join(' · ')}</span></div>
        </div>
      </div>
      <div class="attrs">
        <div class="col"><div class="lab">ATK</div><div class="val">${a.attackPower || 0}<span class="ten">/10</span></div></div>
        <div class="col"><div class="lab">ABL</div><div class="val">${a.abilityPower || 0}<span class="ten">/10</span></div></div>
        <div class="col"><div class="lab">DUR</div><div class="val">${a.durability || 0}<span class="ten">/10</span></div></div>
        <div class="col"><div class="lab">MOB</div><div class="val">${a.mobility || 0}<span class="ten">/10</span></div></div>
      </div>
      <div class="traits">${traitChips}</div>
    </div>`;

  let html = '';
  if (r.crest) html += rowHTML(r.crest, 'CREST');
  html += (r.items || []).map(it => rowHTML(it, null)).join('');
  document.getElementById('buildBox').innerHTML = html || '<div class="loading">No build found.</div>';
}

boot();
</script>
</body>
</html>
